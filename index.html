<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحة ناصر</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 50px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      max-width: 700px;
      width: 90%;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      margin: 0 auto 20px;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(233, 69, 96, 0.5); }
      50%       { box-shadow: 0 0 60px rgba(233, 69, 96, 0.9); }
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #e94560, #f5a623, #e94560);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes shine {
      0%   { background-position: 0%; }
      100% { background-position: 200%; }
    }

    .subtitle {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 30px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.07);
      border-radius: 15px;
      padding: 25px 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(233, 69, 96, 0.3);
    }

    .feature-card .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .feature-card h3 {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 6px;
    }

    .feature-card p {
      font-size: 0.85rem;
      color: #aaa;
    }

    .btn {
      margin-top: 35px;
      padding: 14px 40px;
      font-size: 1rem;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(233, 69, 96, 0.7);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">👑</div>
    <h1>ناصر</h1>
    <p class="subtitle">مرحباً بك في صفحتي الشخصية المميزة</p>

    <div class="features">
      <div class="feature-card">
        <div class="icon">🚀</div>
        <h3>سرعة عالية</h3>
        <p>أداء متميز وسرعة في التنفيذ</p>
      </div>
      <div class="feature-card">
        <div class="icon">🎨</div>
        <h3>تصميم أنيق</h3>
        <p>واجهة جذابة وعصرية</p>
      </div>
      <div class="feature-card">
        <div class="icon">🔒</div>
        <h3>أمان تام</h3>
        <p>حماية كاملة للبيانات</p>
      </div>
      <div class="feature-card">
        <div class="icon">📱</div>
        <h3>متجاوب</h3>
        <p>يعمل على جميع الأجهزة</p>
      </div>
      <div class="feature-card">
        <div class="icon">⚡</div>
        <h3>تفاعلي</h3>
        <p>تجربة مستخدم سلسة</p>
      </div>
      <div class="feature-card">
        <div class="icon">🌟</div>
        <h3>إبداع مستمر</h3>
        <p>تطوير دائم لا يتوقف</p>
      </div>
    </div>

    <button class="btn" onclick="alert('أهلاً وسهلاً يا ناصر! 👑')">تواصل معي</button>

    <div class="footer">© 2024 ناصر - جميع الحقوق محفوظة</div>
  </div>
</body>
</html>
