<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مرحباً بك</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #e3f2fd;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: #1565c0;
      color: #ffffff;
      padding: 60px 80px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(21, 101, 192, 0.4);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.3rem;
      color: #bbdefb;
      margin-bottom: 30px;
    }

    .btn {
      background-color: #ffffff;
      color: #1565c0;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #bbdefb;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>👋 مرحباً بك!</h1>
    <p>يسعدنا زيارتك لهذه الصفحة الرائعة</p>
    <button class="btn">ابدأ الآن</button>
  </div>
</body>
</html>
