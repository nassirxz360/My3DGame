<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>مغامرة ناصر 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
    z-index: 10;
  }
  #score-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 15px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    color: #fff;
  }
  #score-bar .stat {
    background: rgba(0,0,0,0.6);
    border: 2px solid #f0a500;
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 14px;
    font-weight: bold;
    color: #f0a500;
  }
  #health-bar-wrap {
    position: fixed; top: 55px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 18px;
    background: rgba(0,0,0,0.5);
    border: 2px solid #ff4444;
    border-radius: 10px;
    overflow: hidden;
    z-index: 10;
    pointer-events: none;
  }
  #health-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff4444, #ff8800);
    transition: width 0.3s;
    border-radius: 8px;
  }
  #health-label {
    position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 11px; z-index: 10; pointer-events: none;
    text-shadow: 1px 1px 2px #000;
  }
  /* Mobile Controls */
  #mobile-controls {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 220px;
    pointer-events: none;
    z-index: 20;
  }
  /* D-Pad */
  #dpad {
    position: absolute; bottom: 20px; left: 20px;
    width: 150px; height: 150px;
    pointer-events: all;
  }
  .dpad-btn {
    position: absolute;
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: #fff;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s;
    backdrop-filter: blur(4px);
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(240,165,0,0.5);
    border-color: #f0a500;
  }
  #btn-up    { top: 0;    left: 51px; }
  #btn-down  { bottom: 0; left: 51px; }
  #btn-left  { top: 51px; left: 0; }
  #btn-right { top: 51px; right: 0; }
  #btn-center {
    top: 51px; left: 51px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
  }
  /* Action Buttons */
  #action-btns {
    position: absolute; bottom: 20px; right: 20px;
    width: 160px; height: 150px;
    pointer-events: all;
  }
  .action-btn {
    position: absolute;
    width: 55px; height: 55px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold;
    color: #fff;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    border: 3px solid rgba(255,255,255,0.5);
    transition: transform 0.1s, opacity 0.1s;
    backdrop-filter: blur(4px);
  }
  .action-btn:active { transform: scale(0.9); opacity: 0.8; }
  #btn-jump {
    background: radial-gradient(circle, #2196F3, #0d47a1);
    bottom: 0; right: 0;
  }
  #btn-attack {
    background: radial-gradient(circle, #f44336, #b71c1c);
    bottom: 60px; right: 55px;
  }
  #btn-dash {
    background: radial-gradient(circle, #9c27b0, #4a148c);
    bottom: 0; left: 0;
  }
  /* Look joystick */
  #look-zone {
    position: fixed;
    bottom: 0; left: 180px;
    right: 200px;
    height: 220px;
    pointer-events: all;
    z-index: 19;
  }
  #joystick-look {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    display: none;
    pointer-events: none;
  }
  #joystick-look-inner {
    position: absolute;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  /* Overlay screens */
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    color: #fff;
  }
  #overlay h1 {
    font-size: 42px;
    color: #f0a500;
    text-shadow: 0 0 20px #f0a500;
    margin-bottom: 10px;
    animation: pulse 1.5s infinite;
  }
  #overlay p { font-size: 16px; color: #ccc; margin-bottom: 30px; text-align: center; padding: 0 20px; }
  #overlay button {
    padding: 15px 40px;
    font-size: 20px;
    background: linear-gradient(135deg, #f0a500, #e65c00);
    color: #fff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 20px rgba(240,165,0,0.5);
    transition: transform 0.2s;
  }
  #overlay button:hover { transform: scale(1.05); }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px #f0a500; }
    50% { text-shadow: 0 0 40px #f0a500, 0 0 60px #ff8800; }
  }
  #message {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.8);
    color: #f0a500;
    padding: 12px 25px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: bold;
    border: 2px solid #f0a500;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #message.show { opacity: 1; }
  #wave-info {
    position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 16px; font-weight: bold;
    text-shadow: 1px 1px 3px #000;
    z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="score-bar">
    <div class="stat">⭐ <span id="score">0</span></div>
    <div class="stat">🌊 موجة <span id="wave">1</span></div>
    <div class="stat">💎 <span id="coins">0</span></div>
  </div>
</div>

<div id="health-bar-wrap">
  <div id="health-bar"></div>
</div>
<div id="health-label">❤️ صحة ناصر</div>
<div id="wave-info" id="wave-info"></div>

<div id="message"></div>

<!-- Mobile Controls -->
<div id="mobile-controls">
  <div id="dpad">
    <div class="dpad-btn" id="btn-up">▲</div>
    <div class="dpad-btn" id="btn-down">▼</div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div class="dpad-btn" id="btn-right">▶</div>
    <div class="dpad-btn" id="btn-center"></div>
  </div>
  <div id="action-btns">
    <div class="action-btn" id="btn-jump">قفز</div>
    <div class="action-btn" id="btn-attack">هجوم</div>
    <div class="action-btn" id="btn-dash">شرطة</div>
  </div>
</div>
<div id="look-zone">
  <div id="joystick-look"><div id="joystick-look-inner"></div></div>
</div>

<!-- Overlay -->
<div id="overlay">
  <h1>🌟 ناصر المحارب 🌟</h1>
  <p>ساعد ناصر في تجاوز الأعداء وجمع الكنوز!<br>استخدم أزرار التحكم للتحرك والقفز والهجوم</p>
  <button onclick="startGame()">🎮 ابدأ اللعبة</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== GAME STATE =====
let gameRunning = false;
let score = 0;
let coins = 0;
let wave = 1;
let frameCount = 0;
let animFrame;

// ===== PLAYER =====
const player = {
  x: 0, y: 0, z: 0,
  vx: 0, vy: 0, vz: 0,
  hp: 100, maxHp: 100,
  speed: 4,
  jumpPower: 12,
  onGround: false,
  attacking: false,
  attackTimer: 0,
  dashTimer: 0,
  invincible: 0,
  facing: 0,
  color: '#f0a500',
  name: 'ناصر'
};

// ===== CAMERA =====
const cam = {
  x: 0, y: 8, z: -15,
  rotY: 0,
  fov: 500
};

// ===== INPUT =====
const keys = {
  up: false, down: false, left: false, right: false,
  jump: false, attack: false, dash: false
};

// ===== WORLD =====
const platforms = [
  { x: 0,   y: 0,  z: 0,  w: 20, h: 1, d: 20, color: '#2d5a27' },
  { x: 12,  y: 2,  z: 5,  w: 8,  h: 1, d: 8,  color: '#3a7a32' },
  { x: -12, y: 3,  z: 8,  w: 8,  h: 1, d: 8,  color: '#3a7a32' },
  { x: 0,   y: 5,  z: 15, w: 10, h: 1, d: 10, color: '#4a8a42' },
  { x: 18,  y: 4,  z: 15, w: 8,  h: 1, d: 8,  color: '#3a7a32' },
  { x: -18, y: 6,  z: 18, w: 8,  h: 1, d: 8,  color: '#4a8a42' },
  { x: 0,   y: 8,  z: 25, w: 12, h: 1, d: 12, color: '#5a9a52' },
];

let enemies = [];
let particles = [];
let coinItems = [];
let stars = [];

// Generate stars
for(let i=0;i<200;i++){
  stars.push({
    x: (Math.random()-0.5)*200,
    y: Math.random()*50+10,
    z: (Math.random()-0.5)*200,
    size: Math.random()*2+0.5
  });
}

// ===== 3D PROJECTION =====
function project(x, y, z) {
  const dx = x - cam.x;
  const dy = y - cam.y;
  const dz = z - cam.z;
  const cosY = Math.cos(cam.rotY);
  const sinY = Math.sin(cam.rotY);
  const rx = dx * cosY - dz * sinY;
  const rz = dx * sinY + dz * cosY;
  if(rz <= 0.1) return null;
  const scale = cam.fov / rz;
  return {
    sx: canvas.width/2 + rx * scale,
    sy: canvas.height/2 - dy * scale,
    scale: scale,
    depth: rz
  };
}

function projectBox(x, y, z, w, h, d) {
  const corners = [
    [x-w/2, y,   z-d/2],
    [x+w/2, y,   z-d/2],
    [x+w/2, y,   z+d/2],
    [x-w/2, y,   z+d/2],
    [x-w/2, y+h, z-d/2],
    [x+w/2, y+h, z-d/2],
    [x+w/2, y+h, z+d/2],
    [x-w/2, y+h, z+d/2],
  ];
  return corners.map(c => project(c[0], c[1], c[2]));
}

function drawFace(pts, indices, color, alpha=1) {
  const valid = indices.every(i => pts[i] !== null);
  if(!valid) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pts[indices[0]].sx, pts[indices[0]].sy);
  for(let i=1;i<indices.length;i++) {
    ctx.lineTo(pts[indices[i]].sx, pts[indices[i]].sy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawBox(x, y, z, w, h, d, color) {
  const pts = projectBox(x, y, z, w, h, d);
  // Bottom
  drawFace(pts, [0,1,2,3], shadeColor(color, -40));
  // Top
  drawFace(pts, [4,5,6,7], color);
  // Front
  drawFace(pts, [0,1,5,4], shadeColor(color, -20));
  // Back
  drawFace(pts, [3,2,6,7], shadeColor(color, -50));
  // Left
  drawFace(pts, [0,3,7,4], shadeColor(color, -30));
  // Right
  drawFace(pts, [1,2,6,5], shadeColor(color, -10));
}

function shadeColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255, r+amount));
  g = Math.max(0,Math.min(255, g+amount));
  b = Math.max(0,Math.min(255, b+amount));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ===== DRAW PLAYER =====
function drawPlayer() {
  if(player.invincible > 0 && Math.floor(frameCount/4)%2===0) return;
  const px = player.x, py = player.y, pz = player.z;
  // Body
  drawBox(px, py+1, pz, 0.8, 1.2, 0.6, player.attacking ? '#ff6600' : '#f0a500');
  // Head
  drawBox(px, py+2.4, pz, 0.7, 0.7, 0.7, '#ffcc88');
  // Legs
  drawBox(px-0.22, py+0.3, pz, 0.3, 0.7, 0.4, '#1a237e');
  drawBox(px+0.22, py+0.3, pz, 0.3, 0.7, 0.4, '#1a237e');
  // Arms
  const armSwing = Math.sin(frameCount*0.2)*0.3;
  drawBox(px-0.6, py+1.5+armSwing, pz, 0.25, 0.8, 0.3, '#f0a500');
  drawBox(px+0.6, py+1.5-armSwing, pz, 0.25, 0.8, 0.3, '#f0a500');
  // Sword when attacking
  if(player.attacking) {
    drawBox(px+1.2, py+1.8, pz, 0.15, 1.2, 0.15, '#c0c0c0');
  }
  // Name tag
  const np = project(px, py+3.5, pz);
  if(np) {
    ctx.save();
    ctx.font = `bold ${Math.max(10, np.scale*0.8)}px Arial`;
    ctx.fillStyle = '#f0a500';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.fillText('ناصر ⚔️', np.sx, np.sy);
    ctx.restore();
  }
}

// ===== DRAW ENEMY =====
function drawEnemy(e) {
  const alive = e.hp > 0;
  if(!alive) return;
  const c = e.color || '#cc0000';
  drawBox(e.x, e.y+0.5, e.z, 0.9, 1.0, 0.7, c);
  drawBox(e.x, e.y+1.7, e.z, 0.65, 0.65, 0.65, shadeColor(c, 20));
  // HP bar
  const ep = project(e.x, e.y+2.8, e.z);
  if(ep) {
    const bw = ep.scale * 1.2;
    ctx.fillStyle = '#333';
    ctx.fillRect(ep.sx - bw/2, ep.sy - 5, bw, 6);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(ep.sx - bw/2, ep.sy - 5, bw*(e.hp/e.maxHp), 6);
  }
}

// ===== DRAW COIN =====
function drawCoin(c) {
  const p = project(c.x, c.y + Math.sin(frameCount*0.05)*0.3, c.z);
  if(!p) return;
  const r = p.scale * 0.4;
  ctx.save();
  ctx.beginPath();
  ctx.arc(p.sx, p.sy, r, 0, Math.PI*2);
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10;
  ctx.fill();
  ctx.strokeStyle = '#FFA500';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(8,r*0.8)}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', p.sx, p.sy);
  ctx.restore();
}

// ===== DRAW PARTICLE =====
function drawParticle(p) {
  const proj = project(p.x, p.y, p.z);
  if(!proj) return;
  ctx.save();
  ctx.globalAlpha = p.life/p.maxLife;
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 8;
  const r = proj.scale * p.size;
  ctx.beginPath();
  ctx.arc(proj.sx, proj.sy, Math.max(1,r), 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ===== SPAWN ENEMIES =====
function spawnWave() {
  enemies = [];
  const count = 3 + wave * 2;
  const colors = ['#cc0000','#8800cc','#006600','#cc6600','#004488'];
  for(let i=0;i<count;i++) {
    const plat = platforms[Math.floor(Math.random()*platforms.length)];
    enemies.push({
      x: plat.x + (Math.random()-0.5)*plat.w*0.8,
      y: plat.y + plat.h,
      z: plat.z + (Math.random()-0.5)*plat.d*0.8,
      vx: 0, vy: 0, vz: 0,
      hp: 30 + wave*10,
      maxHp: 30 + wave*10,
      speed: 1.5 + wave*0.3,
      color: colors[i%colors.length],
      attackTimer: 0,
      onGround: false
    });
  }
  showMessage('موجة ' + wave + ' 🌊');
}

function spawnCoins() {
  coinItems = [];
  for(let i=0;i<5+wave;i++) {
    const plat = platforms[Math.floor(Math.random()*platforms.length)];
    coinItems.push({
      x: plat.x + (Math.random()-0.5)*plat.w*0.7,
      y: plat.y + plat.h + 0.5,
      z: plat.z + (Math.random()-0.5)*plat.d*0.7,
      collected: false
    });
  }
}

// ===== PHYSICS =====
const GRAVITY = -0.5;
const GROUND_Y = 0;

function getPlatformAt(x, y, z) {
  for(const p of platforms) {
    if(x > p.x - p.w/2 - 0.4 && x < p.x + p.w/2 + 0.4 &&
       z > p.z - p.d/2 - 0.4 && z < p.z + p.d/2 + 0.4 &&
       y >= p.y + p.h - 0.5 && y <= p.y + p.h + 1.5) {
      return p.y + p.h;
    }
  }
  return null;
}

function updatePlayer() {
  // Movement direction relative to camera
  const cosY = Math.cos(cam.rotY);
  const sinY = Math.sin(cam.rotY);
  let mx = 0, mz = 0;
  if(keys.up)    { mx += sinY; mz += cosY; }
  if(keys.down)  { mx -= sinY; mz -= cosY; }
  if(keys.left)  { mx -= cosY; mz += sinY; }
  if(keys.right) { mx += cosY; mz -= sinY; }
  const len = Math.sqrt(mx*mx+mz*mz);
  if(len > 0) { mx/=len; mz/=len; }

  let spd = player.speed;
  if(player.dashTimer > 0) { spd *= 3; player.dashTimer--; }

  player.vx = mx * spd;
  player.vz = mz * spd;

  if(keys.jump && player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
    keys.jump = false;
    spawnParticles(player.x, player.y, player.z, '#88aaff', 6);
  }

  player.vy += GRAVITY;
  player.x += player.vx * 0.1;
  player.y += player.vy * 0.1;
  player.z += player.vz * 0.1;

  // Platform collision
  player.onGround = false;
  const platY = getPlatformAt(player.x, player.y, player.z);
  if(platY !== null && player.vy <= 0) {
    player.y = platY;
    player.vy = 0;
    player.onGround = true;
  }
  if(player.y < GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
  }

  // Attack
  if(player.attackTimer > 0) player.attackTimer--;
  if(keys.attack && player.attackTimer === 0) {
    player.attacking = true;
    player.attackTimer = 20;
    keys.attack = false;
    doAttack();
  }
  if(player.attackTimer < 10) player.attacking = false;

  // Dash
  if(keys.dash && player.dashTimer === 0) {
    player.dashTimer = 15;
    keys.dash = false;
    spawnParticles(player.x, player.y+1, player.z, '#aa44ff', 12);
  }

  if(player.invincible > 0) player.invincible--;

  // Camera follow
  cam.x += (player.x - cam.x) * 0.08;
  cam.y += (player.y + 8 - cam.y) * 0.08;
  cam.z += (player.z - 15 - cam.z) * 0.08;

  // Coin collection
  for(const c of coinItems) {
    if(!c.collected) {
      const dx = player.x-c.x, dy = player.y-c.y, dz = player.z-c.z;
      if(Math.sqrt(dx*dx+dy*dy+dz*dz) < 1.5) {
        c.collected = true;
        coins++;
        score += 10;
        spawnParticles(c.x, c.y, c.z, '#FFD700', 8);
        updateUI();
      }
    }
  }
}

function doAttack() {
  spawnParticles(player.x, player.y+1.5, player.z, '#ff6600', 10);
  for(const e of enemies) {
    if(e.hp <= 0) continue;
    const dx = e.x-player.x, dy = e.y-player.y, dz = e.z-player.z;
    const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist < 3) {
      e.hp -= 20 + wave*5;
      spawnParticles(e.x, e.y+1, e.z, '#ff0000', 8);
      if(e.hp <= 0) {
        score += 50;
        spawnParticles(e.x, e.y+1, e.z, e.color, 15);
        updateUI();
      }
    }
  }
}

function updateEnemies() {
  for(const e of enemies) {
    if(e.hp <= 0) continue;
    // Move toward player
    const dx = player.x - e.x;
    const dz = player.z - e.z;
    const dist = Math.sqrt(dx*dx+dz*dz);
    if(dist > 1.5) {
      e.vx = (dx/dist) * e.speed;
      e.vz = (dz/dist) * e.speed;
    } else {
      e.vx = 0; e.vz = 0;
      // Attack player
      e.attackTimer = (e.attackTimer||0) + 1;
      if(e.attackTimer > 60) {
        e.attackTimer = 0;
        if(player.invincible === 0) {
          player.hp -= 10;
          player.invincible = 60;
          spawnParticles(player.x, player.y+1, player.z, '#ff0000', 6);
          updateUI();
          if(player.hp <= 0) gameOver();
        }
      }
    }
    e.vy += GRAVITY;
    e.x += e.vx * 0.1;
    e.y += e.vy * 0.1;
    e.z += e.vz * 0.1;
    const epy = getPlatformAt(e.x, e.y, e.z);
    if(epy !== null && e.vy <= 0) { e.y = epy; e.vy = 0; e.onGround = true; }
    if(e.y < GROUND_Y) { e.y = GROUND_Y; e.vy = 0; }
  }
  // Check wave clear
  if(enemies.length > 0 && enemies.every(e => e.hp <= 0)) {
    wave++;
    score += 100 * wave;
    updateUI();
    setTimeout(() => { spawnWave(); spawnCoins(); }, 2000);
    showMessage('🎉 أحسنت ناصر! موجة ' + wave + ' قادمة!');
  }
}

function updateParticles() {
  for(let i = particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vy -= 0.02;
    p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }
}

function spawnParticles(x, y, z, color, count) {
  for(let i=0;i<count;i++) {
    particles.push({
      x, y, z,
      vx: (Math.random()-0.5)*0.3,
      vy: Math.random()*0.3,
      vz: (Math.random()-0.5)*0.3,
      color,
      size: Math.random()*0.15+0.05,
      life: 30+Math.random()*20,
      maxLife: 50
    });
  }
}

// ===== DRAW SCENE =====
function drawScene() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(0.5, '#1a1a4e');
  grad.addColorStop(1, '#2d1b00');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars
  for(const s of stars) {
    const p = project(s.x, s.y, s.z);
    if(!p) continue;
    ctx.save();
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.6 + Math.sin(frameCount*0.05+s.x)*0.4;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, Math.max(0.5, p.scale*s.size*0.05), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Ground
  const gpts = [
    project(-50, 0, -50), project(50, 0, -50),
    project(50, 0, 100),  project(-50, 0, 100)
  ];
  if(gpts.every(p=>p)) {
    ctx.fillStyle = '#1a3a1a';
    ctx.beginPath();
    ctx.moveTo(gpts[0].sx, gpts[0].sy);
    gpts.forEach(p => ctx.lineTo(p.sx, p.sy));
    ctx.closePath();
    ctx.fill();
  }

  // Platforms
  for(const p of platforms) {
    drawBox(p.x, p.y, p.z, p.w, p.h, p.d, p.color);
    // Grass top
    drawBox(p.x, p.y+p.h, p.z, p.w, 0.2, p.d, '#4caf50');
  }

  // Coins
  for(const c of coinItems) {
    if(!c.collected) drawCoin(c);
  }

  // Enemies
  for(const e of enemies) drawEnemy(e);

  // Particles
  for(const p of particles) drawParticle(p);

  // Player
  drawPlayer();

  // Shadow under player
  const sp = project(player.x, 0.01, player.z);
  if(sp) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sp.sx, sp.sy, sp.scale*0.6, sp.scale*0.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ===== UI =====
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('coins').textContent = coins;
  document.getElementById('wave').textContent = wave;
  const hpPct = Math.max(0, player.hp/player.maxHp*100);
  document.getElementById('health-bar').style.width = hpPct + '%';
}

let msgTimeout;
function showMessage(txt) {
  const el = document.getElementById('message');
  el.textContent = txt;
  el.classList.add('show');
  clearTimeout(msgTimeout);
  msgTimeout = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== GAME LOOP =====
function gameLoop() {
  if(!gameRunning) return;
  frameCount++;
  updatePlayer();
  updateEnemies();
  updateParticles();
  drawScene();
  animFrame = requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  player.x = 0; player.y = 1; player.z = 0;
  player.vx = 0; player.vy = 0; player.vz = 0;
  player.hp = 100;
  score = 0; coins = 0; wave = 1;
  particles = [];
  gameRunning = true;
  spawnWave();
  spawnCoins();
  updateUI();
  gameLoop();
}

function gameOver() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>💀 انتهت اللعبة</h1>
    <p>أحسنت ناصر! وصلت إلى الموجة ${wave}<br>نقاطك: ${score} ⭐ | عملاتك: ${coins} 💎</p>
    <button onclick="location.reload()">🔄 العب مجدداً</button>
  `;
  ov.style.display = 'flex';
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.up=true;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.down=true;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  if(e.key===' ') keys.jump=true;
  if(e.key==='z'||e.key==='Z') keys.attack=true;
  if(e.key==='x'||e.key==='X') keys.dash=true;
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.up=false;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.down=false;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});

// ===== MOBILE BUTTONS =====
function setupBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; el.classList.add('pressed'); }, {passive:false});
  el.addEventListener('touchend',   e => { e.preventDefault(); keys[key]=false; el.classList.remove('pressed'); }, {passive:false});
  el.addEventListener('mousedown',  e => { keys[key]=true; el.classList.add('pressed'); });
  el.addEventListener('mouseup',    e => { keys[key]=false; el.classList.remove('pressed'); });
}
setupBtn('btn-up',    'up');
setupBtn('btn-down',  'down');
setupBtn('btn-left',  'left');
setupBtn('btn-right', 'right');
setupBtn('btn-jump',  'jump');
setupBtn('btn-attack','attack');
setupBtn('btn-dash',  'dash');

// ===== LOOK JOYSTICK =====
const lookZone = document.getElementById('look-zone');
const joyLook  = document.getElementById('joystick-look');
const joyInner = document.getElementById('joystick-look-inner');
let lookTouch = null, lookOrigin = {x:0,y:0};

lookZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  lookTouch = t.identifier;
  lookOrigin = {x: t.clientX, y: t.clientY};
  joyLook.style.display = 'block';
  joyLook.style.left = (t.clientX - lookZone.getBoundingClientRect().left - 40) + 'px';
  joyLook.style.top  = (t.clientY - lookZone.getBoundingClientRect().top  - 40) + 'px';
}, {passive:false});

lookZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches) {
    if(t.identifier === lookTouch) {
      const dx = t.clientX - lookOrigin.x;
      const dy = t.clientY - lookOrigin.y;
      const maxR = 35;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const cx = dist > maxR ? dx/dist*maxR : dx;
      const cy = dist > maxR ? dy/dist*maxR : dy;
      joyInner.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px))`;
      cam.rotY += dx * 0.002;
    }
  }
}, {passive:false});

lookZone.addEventListener('touchend', e => {
  e.preventDefault();
  joyLook.style.display = 'none';
  joyInner.style.transform = 'translate(-50%,-50%)';
  lookTouch = null;
}, {passive:false});

// Initial draw
drawScene();
</script>
