// ===== 3D MATH =====
function vec3(x,y,z){ return {x,y,z}; }
function addV(a,b){ return {x:a.x+b.x, y:a.y+b.y, z:a.z+b.z}; }
function subV(a,b){ return {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}; }
function mulV(v,s){ return {x:v.x*s, y:v.y*s, z:v.z*s}; }
function dotV(a,b){ return a.x*b.x + a.y*b.y + a.z*b.z; }
function lenV(v){ return Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z); }
function normV(v){ const l=lenV(v)||1; return {x:v.x/l,y:v.y/l,z:v.z/l}; }
function crossV(a,b){ return {x:a.y*b.z-a.z*b.y, y:a.z*b.x-a.x*b.z, z:a.x*b.y-a.y*b.x}; }

// ===== PROJECTION =====
function project3D(wx, wy, wz) {
  const dx = wx - camera.x;
  const dy = wy - camera.y;
  const dz = wz - camera.z;
  const cosY = Math.cos(-camera.rotY);
  const sinY = Math.sin(-camera.rotY);
  const rx = dx * cosY - dz * sinY;
  const rz = dx * sinY + dz * cosY;
  const cosX = Math.cos(-camera.rotX);
  const sinX = Math.sin(-camera.rotX);
  const ry = dy * cosX - rz * sinX;
  const rz2 = dy * sinX + rz * cosX;
  if (rz2 <= 0.1) return null;
  const fovRad = camera.fov * Math.PI / 180;
  const f = (canvas.height / 2) / Math.tan(fovRad / 2);
  const sx = (rx / rz2) * f + canvas.width / 2;
  const sy = (-ry / rz2) * f + canvas.height / 2;
  return { x: sx, y: sy, z: rz2, scale: f / rz2 };
}

function dist2D(x1,z1,x2,z2){ return Math.sqrt((x1-x2)**2+(z1-z2)**2); }
function dist3D(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2); }

// ===== WORLD GENERATION =====
  function generateWorld() {
  // Roads
  for (let i = -5; i <= 5; i++) {
    roads.push({ x: i * 40, z: -200, w: 12, l: 400, dir: 'z' });
    roads.push({ x: -200, z: i * 40, w: 12, l: 400, dir: 'x' });
  }
  // Buildings
  const buildingColors = ['#8B7355','#A0A0A0','#7B8B6F','#8B6914','#6B7B8B','#9B8B7B'];
  for (let bx = -10; bx <= 10; bx++) {
    for (let bz = -10; bz <= 10; bz++) {
      if (Math.abs(bx % 2) === 0 && Math.abs(bz % 2) === 0) continue;
      const wx = bx * 40 + (Math.random()-0.5)*10;
      const wz = bz * 40 + (Math.random()-0.5)*10;
      if (dist2D(wx,wz,0,0) < 15) continue;
      const w = 8 + Math.random()*12;
      const h = 5 + Math.random()*40;
      const d = 8 + Math.random()*12;
      buildings.push({
        x: wx, y: 0, z: wz,
        w, h, d,
        color: buildingColors[Math.floor(Math.random()*buildingColors.length)],
        windowColor: '#88CCFF',
        roofColor: '#555'
      });
    }
  }
  // Trees
  for (let i = 0; i < 80; i++) {
    const tx = (Math.random()-0.5)*300;
    const tz = (Math.random()-0.5)*300;
    if (dist2D(tx,tz,0,0) < 10) continue;
    trees.push({ x:tx, z:tz, h: 4+Math.random()*4, r: 2+Math.random()*2 });
  }
  // NPCs
  for (let i = 0; i < 15; i++) {
    const nx = (Math.random()-0.5)*100;
    const nz = (Math.random()-0.5)*100;
    npcs.push({
      x: nx, y: 0, z: nz,
      vx: 0, vz: 0,
      rotY: Math.random()*Math.PI*2,
      health: 100,
      state: 'walk',
      stateTimer: Math.random()*3,
      color: `hsl(${Math.random()*360},50%,50%)`,
      alertTimer: 0,
      speed: 0.02 + Math.random()*0.02
    });
  }
  // Cars
  const carColors = ['#FF3333','#3333FF','#33FF33','#FFFF33','#FF33FF','#33FFFF','#FF8800'];
  for (let i = 0; i < 10; i++) {
    const lane = (Math.floor(Math.random()*5)-2)*40;
    cars.push({
      x: lane + (Math.random()-0.5)*4,
      y: 0, z: (Math.random()-0.5)*200,
      vx: 0, vz: (Math.random()>0.5?1:-1)*(0.3+Math.random()*0.4),
      rotY: 0,
      color: carColors[Math.floor(Math.random()*carColors.length)],
      w: 2.2, h: 1.5, l: 4.5,
      health: 100,
      occupied: false
    });
  }
  // Pickups
  for (let i = 0; i < 20; i++) {
    const type = Math.random() < 0.4 ? 'health' : Math.random() < 0.5 ? 'armor' : Math.random() < 0.5 ? 'ammo' : 'money';
    pickups.push({
      x: (Math.random()-0.5)*150,
      y: 0.5,
      z: (Math.random()-0.5)*150,
      type,
      active: true,
      rot: 0
    });
  }
}

// ===== WEATHER UPDATE =====
function updateWeather(dt) {
  weather.timer -= dt;
  if (weather.timer <= 0) {
    weather.type = weather.types[Math.floor(Math.random()*weather.types.length)];
    weather.timer = 30 + Math.random()*90;
    if (weather.type === 'rain' || weather.type === 'storm') {
      weather.targetFog = 0.3 + Math.random()*0.3;
      weather.windX = (Math.random()-0.5)*0.5;
      weather.windZ = (Math.random()-0.5)*0.5;
    } else if (weather.type === 'fog') {
      weather.targetFog = 0.6 + Math.random()*0.3;
      weather.windX = 0; weather.windZ = 0;
    } else {
      weather.targetFog = 0;
      weather.windX = 0; weather.windZ = 0;
    }
    showNotification('Weather: ' + weather.type.toUpperCase());
  }
  weather.fogDensity += (weather.targetFog - weather.fogDensity) * dt * 0.5;
  if (weather.type === 'rain' || weather.type === 'storm') {
    const count = weather.type === 'storm' ? 8 : 4;
    for (let i = 0; i < count; i++) {
      weather.rainDrops.push({
        x: Math.random()*canvas.width,
        y: -10,
        vy: 8 + Math.random()*6,
        vx: weather.windX * 60,
        life: 1
      });
    }
  }
  for (let i = weather.rainDrops.length-1; i >= 0; i--) {
    const d = weather.rainDrops[i];
    d.x += d.vx * dt;
    d.y += d.vy * (canvas.height/100) * dt * 60;
    if (d.y > canvas.height) weather.rainDrops.splice(i,1);
  }
  if (weather.type === 'storm') {
    weather.lightningTimer -= dt;
    if (weather.lightningTimer <= 0) {
      weather.lightning = 0.5;
      weather.lightningTimer = 3 + Math.random()*7;
    }
    if (weather.lightning > 0) weather.lightning -= dt * 3;
  }
}

// ===== DRAW WEATHER =====
function drawWeather() {
  if (weather.fogDensity > 0.01) {
    ctx.fillStyle = `rgba(200,210,220,${weather.fogDensity})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  if (weather.type === 'rain' || weather.type === 'storm') {
    ctx.strokeStyle = 'rgba(150,180,255,0.6)';
    ctx.lineWidth = 1;
    for (const d of weather.rainDrops) {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.vx*0.05, d.y + 10);
      ctx.stroke();
    }
  }
  if (weather.lightning > 0) {
    ctx.fillStyle = `rgba(255,255,255,${weather.lightning * 0.4})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
}

// ===== EXPLOSION =====
function createExplosion(x, y, z, radius) {
  explosions.push({ x, y, z, radius, maxRadius: radius, life: 1.5, maxLife: 1.5 });
  for (let i = 0; i < 40; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 1 + Math.random()*3;
    particles.push({
      x, y: y+0.5, z,
      vx: Math.cos(angle)*speed*(Math.random()-0.5),
      vy: 2 + Math.random()*4,
      vz: Math.sin(angle)*speed*(Math.random()-0.5),
      life: 1.5, maxLife: 1.5,
      color: Math.random()>0.5?'#FF4400':'#FFAA00',
      size: 0.3 + Math.random()*0.4
    });
  }
  for (let i = 0; i < 20; i++) {
    const angle = Math.random()*Math.PI*2;
    smokeParticles.push({
      x: x+(Math.random()-0.5)*radius,
      y: y+1,
      z: z+(Math.random()-0.5)*radius,
      vx: (Math.random()-0.5)*0.3,
      vy: 0.5+Math.random()*0.5,
      vz: (Math.random()-0.5)*0.3,
      life: 3+Math.random()*2, maxLife: 5,
      size: 0.5+Math.random()*1
    });
  }
  const distToPlayer = dist3D(player, {x,y,z});
  if (distToPlayer < radius * 3) {
    const dmg = Math.max(0, 80 - distToPlayer * 5);
    takeDamage(dmg);
  }
  game.wanted = Math.min(5, game.wanted + 2);
  game.wantedTimer = 40;
}

// ===== TAKE DAMAGE =====
function takeDamage(amount) {
  if (player.armor > 0) {
    const absorbed = Math.min(player.armor, amount * 0.7);
    player.armor -= absorbed;
    amount -= absorbed;
  }
  player.health -= amount;
  if (player.health <= 0) {
    player.health = 0;
    playerDeath();
  }
  // Screen flash red
  soundVisuals.push({ type:'damage', life:0.3, maxLife:0.3 });
}

// ===== PLAYER DEATH =====
function playerDeath() {
  scoreSystem.deaths++;
  showNotification('💀 YOU DIED! Respawning...');
  setTimeout(() => {
    player.x = 0; player.y = 1.8; player.z = 0;
    player.health = 100; player.armor = 50;
    player.vx = 0; player.vy = 0; player.vz = 0;
    game.wanted = 0;
    game.money = Math.max(0, game.money - 500);
    showNotification('Respawned! Lost $500');
  }, 2000);
}

// ===== POLICE SPAWN =====
function spawnPolice() {
  if (game.wanted < 2) return;
  const angle = Math.random()*Math.PI*2;
  const dist = 30 + Math.random()*20;
  police.push({
    x: player.x + Math.cos(angle)*dist,
    y: 0,
    z: player.z + Math.sin(angle)*dist,
    vx: 0, vz: 0,
    rotY: 0,
    health: 100,
    state: 'chase',
    shootTimer: 1+Math.random()*2,
    color: '#1144FF',
    speed: 0.06 + game.wanted*0.01,
    alertTimer: 30
  });
}

// ===== UPDATE POLICE =====
function updatePolice(dt) {
  policeSpawnTimer.t -= dt;
  if (policeSpawnTimer.t <= 0 && game.wanted >= 2) {
    if (police.length < game.wanted * 2) spawnPolice();
    policeSpawnTimer.t = 5;
  }
  for (let i = police.length-1; i >= 0; i--) {
    const p = police[i];
    if (p.health <= 0) { police.splice(i,1); continue; }
    const dx = player.x - p.x;
    const dz = player.z - p.z;
    const d = Math.sqrt(dx*dx+dz*dz)||1;
    p.rotY = Math.atan2(dx, dz);
    if (d > 3) {
      p.x += (dx/d)*p.speed*60*dt;
      p.z += (dz/d)*p.speed*60*dt;
    }
    p.shootTimer -= dt;
    if (p.shootTimer <= 0 && d < 25) {
      p.shootTimer = 1.5 + Math.random()*1.5;
      if (Math.random() < 0.4 + game.wanted*0.1) {
        takeDamage(10 + game.wanted*3);
        particles.push({
          x: p.x, y: p.y+1, z: p.z,
          vx:(Math.random()-0.5)*0.3, vy:0.2, vz:(Math.random()-0.5)*0.3,
          life:0.3, maxLife:0.3, color:'#FFAA00', size:0.15
        });
      }
    }
    p.alertTimer -= dt;
    if (p.alertTimer <= 0 || game.wanted === 0) police.splice(i,1);
  }
}

// ===== DRAW POLICE =====
function drawPolice(p) {
  const d = dist3D(player, {x:p.x,y:p.y,z:p.z});
  if (d > 80) return;
  const bodyP = project3D(p.x, p.y+1, p.z);
  if (!bodyP || bodyP.z < 0.5) return;
  const s = bodyP.scale;
  const bw = 40*s, bh = 60*s;
  if (bw < 2) return;
  ctx.fillStyle = '#1144FF';
  ctx.fillRect(bodyP.x-bw/2, bodyP.y-bh/2, bw, bh);
  const headP = project3D(p.x, p.y+1.9, p.z);
  if (headP) {
    ctx.fillStyle = '#FFCC99';
    ctx.beginPath();
    ctx.arc(headP.x, headP.y, 20*s, 0, Math.PI*2);
    ctx.fill();
    // Police hat
    ctx.fillStyle = '#000088';
    ctx.fillRect(headP.x-22*s, headP.y-22*s, 44*s, 10*s);
  }
  // Badge
  if (s > 0.5) {
    ctx.fillStyle = '#FFDD00';
    ctx.font = `${Math.max(8,12*s)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('POLICE', bodyP.x, bodyP.y);
  }
}

// ===== DRAW SMOKE =====
function drawSmoke() {
  for (let i = smokeParticles.length-1; i >= 0; i--) {
    const p = smokeParticles[i];
    p.x += p.vx; p.y += p.vy*0.016; p.z += p.vz;
    p.life -= 0.016;
    if (p.life <= 0) { smokeParticles.splice(i,1); continue; }
    const pp = project3D(p.x, p.y, p.z);
    if (!pp) continue;
    const alpha = (p.life/p.maxLife)*0.4;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#888888';
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, p.size*pp.scale*40, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ===== DRAW FIRE =====
function drawFire() {
  for (let i = fireParticles.length-1; i >= 0; i--) {
    const p = fireParticles[i];
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.life -= 0.016;
    if (p.life <= 0) { fireParticles.splice(i,1); continue; }
    const pp = project3D(p.x, p.y, p.z);
    if (!pp) continue;
    const alpha = p.life/p.maxLife;
    ctx.globalAlpha = alpha;
    const colors = ['#FF2200','#FF6600','#FFAA00','#FFFF00'];
    ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
    ctx.beginPath();
    ctx.arc(pp.x, pp.y, p.size*pp.scale*35, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ===== DRAW EXPLOSIONS =====
function drawExplosions() {
  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    e.life -= 0.016;
    if (e.life <= 0) { explosions.splice(i,1); continue; }
    const pp = project3D(e.x, e.y, e.z);
    if (!pp) continue;
    const progress = 1 - e.life/e.maxLife;
    const r = e.radius * progress * pp.scale * 40;
    const alpha = e.life/e.maxLife;
    const grad = ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,r);
    grad.addColorStop(0,`rgba(255,255,200,${alpha})`);
    grad.addColorStop(0.3,`rgba(255,100,0,${alpha*0.8})`);
    grad.addColorStop(1,`rgba(100,50,0,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pp.x,pp.y,r,0,Math.PI*2);
    ctx.fill();
  }
}

// ===== MISSION SYSTEM =====
function startMission(id) {
  if (missions[id].done) { showNotification('Mission already completed!'); return; }
  activeMission = missions[id];
  activeMission.active = true;
  activeMission.current = 0;
  showNotification('🎯 Mission: ' + activeMission.name + ' - ' + activeMission.desc);
}

function updateMissions(dt) {
  if (!activeMission) {
    if (Math.random() < 0.001) startMission(Math.floor(Math.random()*missions.length));
    return;
  }
  if (activeMission.id === 2) {
    activeMission.current += dt;
    surviveTimer += dt;
  }
  if (activeMission.id === 1) {
    activeMission.current = game.money;
  }
  if (activeMission.current >= activeMission.target) {
    completeMission();
  }
}

function completeMission() {
  if (!activeMission) return;
  game.money += activeMission.reward;
  scoreSystem.moneyEarned += activeMission.reward;
  showNotification('✅ Mission Complete! +$' + activeMission.reward);
  activeMission.done = true;
  activeMission.active = false;
  activeMission = null;
  setTimeout(() => {
    const next = missions.find(m => !m.done);
    if (next) startMission(next.id);
  }, 5000);
}

// ===== ACHIEVEMENT CHECK =====
function checkAchievements() {
  if (!achievements[0].done && scoreSystem.kills >= 1) {
    achievements[0].done = true;
    showNotification('🏆 Achievement: ' + achievements[0].name);
  }
  if (!achievements[1].done && game.money >= 10000) {
    achievements[1].done = true;
    showNotification('🏆 Achievement: ' + achievements[1].name);
  }
  if (!achievements[2].done && game.time >= 600) {
    achievements[2].done = true;
    showNotification('🏆 Achievement: ' + achievements[2].name);
  }
  if (!achievements[3].done && scoreSystem.shotsFired >= 100) {
    achievements[3].done = true;
    showNotification('🏆 Achievement: ' + achievements[3].name);
  }
  if (!achievements[4].done && game.wanted >= 5) {
    achievements[4].done = true;
    showNotification('🏆 Achievement: ' + achievements[4].name);
  }
  if (!achievements[5].done && player.running && player.speed > 0) {
    achievements[5].done = true;
    showNotification('🏆 Achievement: ' + achievements[5].name);
  }
}

// ===== FOOTSTEPS =====
function updateFootsteps(dt) {
  if (player.speed > 0 && player.onGround) {
    footstepTimer -= dt;
    if (footstepTimer <= 0) {
      footstepTimer = player.running ? 0.25 : 0.45;
      footstepParticles.push({
        x: player.x + (Math.random()-0.5)*0.3,
        y: 0.01,
        z: player.z + (Math.random()-0.5)*0.3,
        life: 2, maxLife: 2,
        size: 0.15
      });
    }
  }
  for (let i = footstepParticles.length-1; i >= 0; i--) {
    footstepParticles[i].life -= dt;
    if (footstepParticles[i].life <= 0) footstepParticles.splice(i,1);
  }
}

// ===== DRAW FOOTSTEPS =====
function drawFootsteps() {
  for (const fp of footstepParticles) {
    const pp = project3D(fp.x, fp.y, fp.z);
    if (!pp) continue;
    ctx.globalAlpha = (fp.life/fp.maxLife)*0.4;
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(pp.x, pp.y, fp.size*pp.scale*30, fp.size*pp.scale*15, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ===== DRAW HUD EXTRAS =====
function drawHUDExtras() {
  // Damage flash
  for (let i = soundVisuals.length-1; i >= 0; i--) {
    const sv = soundVisuals[i];
    sv.life -= 0.016;
    if (sv.life <= 0) { soundVisuals.splice(i,1); continue; }

      ctx.fillStyle = `rgba(255,0,0,${(sv.life/sv.maxLife)*0.35})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  }
  // Combo display
  if (scoreSystem.combo > 1) {
    ctx.fillStyle = `rgba(255,200,0,${Math.min(1,scoreSystem.comboTimer/2)})`;
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('x' + scoreSystem.combo + ' COMBO!', canvas.width/2, canvas.height/2 - 80);
  }
  // Mission HUD
  if (activeMission) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(canvas.width/2-150, 10, 300, 50);
    ctx.fillStyle = '#FFCC00';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎯 ' + activeMission.name, canvas.width/2, 28);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Arial';
    const prog = Math.min(1, activeMission.current/activeMission.target);
    ctx.fillText(activeMission.desc + ' (' + Math.floor(prog*100) + '%)', canvas.width/2, 48);
    // Progress bar
    ctx.fillStyle = '#333';
    ctx.fillRect(canvas.width/2-140, 52, 280, 6);
    ctx.fillStyle = '#00FF88';
    ctx.fillRect(canvas.width/2-140, 52, 280*prog, 6);
  }
  // Wanted flash
  if (game.wanted >= 3) {
    wantedFlash += 0.016;
    if (Math.sin(wantedFlash*8) > 0.5) {
      ctx.strokeStyle = 'rgba(255,0,0,0.4)';
      ctx.lineWidth = 8;
      ctx.strokeRect(4,4,canvas.width-8,canvas.height-8);
    }
  }
  // Compass
  drawCompass();
  // Kill feed
  drawKillFeed();
  // Stats panel
  drawStatsPanel();
}

  ctx.font = '12px Arial';

}

// ===== DRAW STREET LIGHTS =====
function initStreetLights() {
  for (let i = -5; i <= 5; i++) {
    for (let j = -5; j <= 5; j++) {
      if (Math.abs(i)%2===0 || Math.abs(j)%2===0) {
        dayNight.streetLights.push({ x: i*40+5, z: j*40+5, on: false });
      }
    }
  }
}

function drawStreetLights() {
  const isNight = game.dayTime > 0.6 || game.dayTime < 0.15;
  dayNight.lightsOn = isNight;
  for (const sl of dayNight.streetLights) {
    const d = dist2D(player.x, player.z, sl.x, sl.z);
    if (d > 80) continue;
    // Pole
    const base = project3D(sl.x, 0, sl.z);
    const top = project3D(sl.x, 5, sl.z);
    if (!base || !top) continue;
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(base.x, base.y);
    ctx.lineTo(top.x, top.y);
    ctx.stroke();
    // Light
    if (isNight) {
      ctx.fillStyle = '#FFFFAA';
      ctx.beginPath();
      ctx.arc(top.x, top.y, 5*top.scale*10, 0, Math.PI*2);
      ctx.fill();
      // Glow
      const glow = ctx.createRadialGradient(top.x,top.y,0,top.x,top.y,30*top.scale*10);
      glow.addColorStop(0,'rgba(255,255,150,0.3)');
      glow.addColorStop(1,'rgba(255,255,150,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(top.x,top.y,30*top.scale*10,0,Math.PI*2);
      ctx.fill();
    }
  }
}

    ctx.moveTo(pp.x-8*s, pp.y+wing);

    ctx.lineTo(pp.x+8*s, pp.y+wing);

  }
}

  const msgs = ['GTA5','LSPD','GROVE ST','BALLAS','VAGOS','NO COPS'];
  for (let i = 0; i < 20; i++) {
    graffitiSpots.push({
      x: (Math.random()-0.5)*200,
      z: (Math.random()-0.5)*200,
      msg: msgs[Math.floor(Math.random()*msgs.length)],
      color: `hsl(${Math.random()*360},80%,60%)`
    });
  }
}

function drawGraffiti() {
  for (const g of graffitiSpots) {
    const d = dist2D(player.x, player.z, g.x, g.z);
    if (d > 30) continue;
    const pp = project3D(g.x, 1.5, g.z);
    if (!pp || pp.scale < 0.5) continue;
    ctx.fillStyle = g.color;
    ctx.font = `bold ${Math.min(20,16*pp.scale)}px Arial`;
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(1, pp.scale);
    ctx.fillText(g.msg, pp.x, pp.y);
    ctx.globalAlpha = 1;
  }
}

// ===== DRAW TRASH =====
const trashItems = [];
function initTrash() {
  for (let i = 0; i < 30; i++) {
    trashItems.push({
      x: (Math.random()-0.5)*200,
      z: (Math.random()-0.5)*200,
      type: Math.random()>0.5?'can':'paper',
      rot: Math.random()*Math.PI*2
    });
  }
}

function drawTrash() {
  for (const t of trashItems) {
    const d = dist2D(player.x, player.z, t.x, t.z);
    if (d > 20) continue;
    const pp = project3D(t.x, 0.1, t.z);
    if (!pp || pp.scale < 1) continue;
    ctx.fillStyle = t.type==='can'?'#CC4400':'#DDDDCC';
    ctx.beginPath();
    if (t.type==='can') ctx.arc(pp.x, pp.y, 3*pp.scale, 0, Math.PI*2);
    else ctx.fillRect(pp.x-4*pp.scale, pp.y-2*pp.scale, 8*pp.scale, 4*pp.scale);
    ctx.fill();
  }
}

// ===== DRAW FENCES =====
function drawFences() {
  const fencePositions = [
    {x1:-50,z1:-50,x2:50,z2:-50},
    {x1:50,z1:-50,x2:50,z2:50}
  ];
  for (const f of fencePositions) {
    const p1 = project3D(f.x1, 1.2, f.z1);
    const p2 = project3D(f.x2, 1.2, f.z2);
    if (!p1 || !p2) continue;
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    const steps = 8;
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      const px = f.x1+(f.x2-f.x1)*t;
      const pz = f.z1+(f.z2-f.z1)*t;
      const pt = project3D(px, 1.5, pz);
      const pb = project3D(px, 0, pz);
      if (!pt || !pb) continue;
      ctx.strokeStyle = '#6B4914';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pt.x, pt.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }
  }
}

// ===== DRAW HELICOPTER =====
const helicopter = {
  x: 50, y: 30, z: 50,
  vx: 0.1, vz: 0.1,
  rotorPhase: 0,
  active: false,
  searchLight: false
};

function updateHelicopter(dt) {
  if (game.wanted < 4) { helicopter.active = false; return; }
  helicopter.active = true;
  helicopter.rotorPhase += dt*10;
  helicopter.x += helicopter.vx;
  helicopter.z += helicopter.vz;
  const dx = player.x - helicopter.x;
  const dz = player.z - helicopter.z;
  const d = Math.sqrt(dx*dx+dz*dz);
  if (d > 5) {
    helicopter.vx = (dx/d)*0.3;
    helicopter.vz = (dz/d)*0.3;
  }
  helicopter.searchLight = true;
}

function drawHelicopter() {
  if (!helicopter.active) return;
  const pp = project3D(helicopter.x, helicopter.y, helicopter.z);
  if (!pp) return;
  const s = pp.scale;
  // Body
  ctx.fillStyle = '#333';
  ctx.fillRect(pp.x-20*s, pp.y-8*s, 40*s, 16*s);
  // Rotor
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.save();
  ctx.translate(pp.x, pp.y-8*s);
  ctx.rotate(helicopter.rotorPhase);
  ctx.beginPath();
  ctx.moveTo(-30*s, 0);
  ctx.lineTo(30*s, 0);
  ctx.stroke();
  ctx.restore();
  // Searchlight
  if (helicopter.searchLight) {
    const sp = project3D(helicopter.x, 0, helicopter.z);
    if (sp) {
      const grad = ctx.createLinearGradient(pp.x, pp.y, sp.x, sp.y);
      grad.addColorStop(0,'rgba(255,255,200,0.3)');
      grad.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(pp.x-5*s, pp.y);
      ctx.lineTo(sp.x-20, sp.y);
      ctx.lineTo(sp.x+20, sp.y);
      ctx.lineTo(pp.x+5*s, pp.y);
      ctx.closePath();
      ctx.fill();
    }
  }
  // Police label
  ctx.fillStyle = '#0044FF';
  ctx.font = `bold ${Math.max(8,10*s)}px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('POLICE', pp.x, pp.y+4);
}

// ===== DRAW DAMAGE NUMBERS =====
const damageNumbers = [];
function addDamageNumber(x, y, z, amount, color) {
  damageNumbers.push({ x, y, z, amount, color: color||'#FF4444', life: 1.5, maxLife: 1.5, vy: 0.02 });
}
function drawDamageNumbers() {
  for (let i = damageNumbers.length-1; i >= 0; i--) {
    const dn = damageNumbers[i];
    dn.life -= 0.016;
    dn.y += dn.vy;
    if (dn.life <= 0) { damageNumbers.splice(i,1); continue; }
    const pp = project3D(dn.x, dn.y, dn.z);
    if (!pp) continue;
    ctx.globalAlpha = dn.life/dn.maxLife;
    ctx.fillStyle = dn.color;
    ctx.font = `bold ${Math.max(12,16*pp.scale)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('-'+dn.amount, pp.x, pp.y);
    ctx.globalAlpha = 1;
  }
}

// ===== COLLISION =====
function checkBuildingCollision(nx, nz) {
  for (const b of buildings) {
    const hw = b.w/2 + player.radius;
    const hd = b.d/2 + player.radius;
    if (nx > b.x-hw && nx < b.x+hw && nz > b.z-hd && nz < b.z+hd) return true;
  }
  return false;
}

function shoot() {
  const w = player.weapons[player.currentWeapon];
  const now = Date.now();
  if (now - w.lastShot < w.fireRate) return;
  if (w.ammo === 0) { showNotification('No Ammo! Press R to reload'); return; }
  w.lastShot = now;
  if (w.ammo > 0) w.ammo--;
  // Muzzle flash
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: camera.x + Math.sin(camera.rotY)*2,
      y: camera.y - 0.2,
      z: camera.z + Math.cos(camera.rotY)*2,
      vx: (Math.random()-0.5)*0.3,
      vy: Math.random()*0.2,
      vz: (Math.random()-0.5)*0.3,
      life: 0.3, maxLife: 0.3,
      color: '#FFAA00', size: 0.15
    });
  }
  // Raycast
  const dirX = Math.sin(camera.rotY) * Math.cos(camera.rotX);
  const dirY = -Math.sin(camera.rotX);
  const dirZ = Math.cos(camera.rotY) * Math.cos(camera.rotX);
  let hitDist = w.range;
  let hitNPC = null;
  for (const npc of npcs) {
    if (npc.health <= 0) continue;
    const dx = npc.x - camera.x;
    const dy = (npc.y+1) - camera.y;
    const dz = npc.z - camera.z;
    const t = dotV({x:dx,y:dy,z:dz},{x:dirX,y:dirY,z:dirZ});
    if (t < 0 || t > hitDist) continue;
    const px = camera.x + dirX*t;
    const py = camera.y + dirY*t;
    const pz = camera.z + dirZ*t;
    const d = dist3D({x:px,y:py,z:pz},{x:npc.x,y:npc.y+1,z:npc.z});
    if (d < 1.0) { hitDist = t; hitNPC = npc; }
  }
  if (hitNPC) {
    hitNPC.health -= w.damage;
    hitNPC.state = 'flee';
    hitNPC.alertTimer = 5;
    scoreSystem.hits++;
    addDamageNumber(hitNPC.x, hitNPC.y+2, hitNPC.z, w.damage, '#FF4444');
    if (hitNPC.health <= 0) {
      game.money += 50;
      scoreSystem.kills++;
      scoreSystem.moneyEarned += 50;
      scoreSystem.combo++;
      scoreSystem.comboTimer = 3;
      missionKills++;
      if (activeMission && activeMission.id===0) activeMission.current = missionKills;
      game.wanted = Math.min(5, game.wanted + 1);
      game.wantedTimer = 30;
      addKillFeed('🩸 Enemy Eliminated +$50');
      showNotification('+$50 Eliminated! x'+scoreSystem.combo+' combo');
      addBloodDecal(hitNPC.x, hitNPC.z);
      for (let i = 0; i < 15; i++) {
        particles.push({
          x: hitNPC.x, y: hitNPC.y+1, z: hitNPC.z,
          vx: (Math.random()-0.5)*0.5,
          vy: Math.random()*0.5,
          vz: (Math.random()-0.5)*0.5,
          life: 1, maxLife: 1,
          color: '#FF0000', size: 0.2
        });
      }
      checkAchievements();
    }
    bullets.push({
      x: camera.x+dirX*hitDist, y: camera.y+dirY*hitDist, z: camera.z+dirZ*hitDist,
      life: 0.5, maxLife: 0.5, color: '#FF4400', size: 0.3
    });
  }
  scoreSystem.shotsFired++;
  checkAchievements();
}

// ===== NOTIFICATION =====
function showNotification(msg) {
  game.notification = msg;
  game.notifTimer = 3;
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.style.opacity = '1';
}

// ===== UPDATE =====
let lastTime = 0;
let lastPlayerX = 0, lastPlayerZ = 0;
function update(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  game.time += dt;
  game.dayTime = (game.dayTime + dt * 0.005) % 1;
  scoreSystem.distanceTraveled += dist2D(player.x, player.z, lastPlayerX, lastPlayerZ);
  lastPlayerX = player.x; lastPlayerZ = player.z;
  if (scoreSystem.comboTimer > 0) {
    scoreSystem.comboTimer -= dt;
    if (scoreSystem.comboTimer <= 0) scoreSystem.combo = 0;
  }
  const currentScore = scoreSystem.kills*100 + game.money + Math.floor(game.time);
  if (currentScore > scoreSystem.highScore) scoreSystem.highScore = currentScore;
  updateWeather(dt);
  updatePolice(dt);
  updateMissions(dt);
  updateHelicopter(dt);
  updateFootsteps(dt);
  checkAchievements();
  // Blood decal life
  for (const bd of bloodDecals) bd.life -= dt;
  game.dayTime = (game.dayTime + dt * 0.005) % 1;

  // Notification
  if (game.notifTimer > 0) {
    game.notifTimer -= dt;
    if (game.notifTimer <= 0) {
      document.getElementById('notification').style.opacity = '0';
    }
  }

  // Wanted level decay
  if (game.wanted > 0) {
    game.wantedTimer -= dt;
    if (game.wantedTimer <= 0) {
      game.wanted = Math.max(0, game.wanted - 1);
      game.wantedTimer = 20;
    }
  }

  // Player movement
  if (!player.inCar) {
    const spd = (player.running || mobileButtons.run) ? 8 : 4;
    const jdx = joystick.dx / 70;
    const jdz = joystick.dy / 70;
    let mx = 0, mz = 0;
    if (keys['KeyW'] || keys['ArrowUp']) mz = 1;
    if (keys['KeyS'] || keys['ArrowDown']) mz = -1;
    if (keys['KeyA'] || keys['ArrowLeft']) mx = -1;
    if (keys['KeyD'] || keys['ArrowRight']) mx = 1;
    if (joystick.active) { mx = jdx; mz = -jdz; }
    const cosY = Math.cos(camera.rotY);
    const sinY = Math.sin(camera.rotY);
    const fwdX = sinY * mz + cosY * mx;
    const fwdZ = cosY * mz - sinY * mx;
    const len = Math.sqrt(fwdX*fwdX + fwdZ*fwdZ);
    if (len > 0) {
      const nx = player.x + (fwdX/len)*spd*dt;
      const nz = player.z + (fwdZ/len)*spd*dt;
      if (!checkBuildingCollision(nx, player.z)) player.x = nx;
      if (!checkBuildingCollision(player.x, nz)) player.z = nz;
      player.rotY = Math.atan2(fwdX/len, fwdZ/len);
      player.speed = spd;
    } else {
      player.speed = 0;
    }
    // Gravity
    player.vy -= 20 * dt;
    player.y += player.vy * dt;
    if (player.y <= 1.8) {
      player.y = 1.8;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
    }
    // Jump
    if ((keys['Space'] || mobileButtons.jump) && player.onGround) {
      player.vy = 8;
      player.onGround = false;
    }
    // Camera follow
    camera.x = player.x;
    camera.y = player.y + 0.1;
    camera.z = player.z;
    camera.rotX = player.rotX;
    camera.rotY = player.rotY;
  }

  // Mouse look
  if (mouse.locked) {
    player.rotY += mouse.dx * 0.002;
    player.rotX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, player.rotX - mouse.dy * 0.002));
    camera.rotY = player.rotY;
    camera.rotX = player.rotX;
    mouse.dx = 0; mouse.dy = 0;
  }

  // Shooting
  if ((player.shooting || mobileButtons.shoot || mouse.buttons[0]) && !player.reloading) {
    shoot();
  }

  // Reload
  if (keys['KeyR'] && !player.reloading) {
    const w = player.weapons[player.currentWeapon];
    if (w.ammo >= 0 && w.ammo < w.maxAmmo) {
      player.reloading = true;
      showNotification('Reloading...');
      setTimeout(() => {
        w.ammo = w.maxAmmo;
        player.reloading = false;
        showNotification('Ready!');
      }, 2000);
    }
  }

  // Weapon switch
  if (keys['Digit1']) player.currentWeapon = 0;
  if (keys['Digit2']) player.currentWeapon = 1;
  if (keys['Digit3']) player.currentWeapon = 2;
  if (keys['Digit4']) player.currentWeapon = 3;
  if (keys['Digit5']) player.currentWeapon = 4;
  if (keys['Digit6']) player.currentWeapon = 5;
  if (keys['KeyT']) { keys['KeyT'] = false; statsVisible = !statsVisible; }
  if (keys['KeyG']) {
    keys['KeyG'] = false;
    createExplosion(player.x + Math.sin(camera.rotY)*10, 0, player.z + Math.cos(camera.rotY)*10, 5);
  }
  if (keys['KeyG']) {
    keys['KeyG'] = false;
    createExplosion(player.x + Math.sin(camera.rotY)*10, 0, player.z + Math.cos(camera.rotY)*10, 5);
  }

  // Pickup collection
  for (const p of pickups) {
    if (!p.active) continue;
    p.rot += dt * 2;
    const d = dist3D(player, p);
    if (d < 2) {
      p.active = false;
      if (p.type === 'health') { player.health = Math.min(100, player.health+30); showNotification('+30 Health!'); }
      else if (p.type === 'armor') { player.armor = Math.min(100, player.armor+50); showNotification('+50 Armor!'); }
      else if (p.type === 'ammo') { player.weapons[1].ammo = player.weapons[1].maxAmmo; player.weapons[2].ammo = player.weapons[2].maxAmmo; showNotification('Ammo Refilled!'); }
      else if (p.type === 'money') { game.money += 100 + Math.floor(Math.random()*400); showNotification('+$' + (100+Math.floor(Math.random()*400)) + ' Collected!'); }
    }
  }

  // NPC update
  for (const npc of npcs) {
    if (npc.health <= 0) continue;
    npc.stateTimer -= dt;
    const distToPlayer = dist3D(player, {x:npc.x,y:npc.y,z:npc.z});
    if (distToPlayer < 20 && game.wanted > 0) npc.state = 'flee';
    if (npc.state === 'walk') {
      if (npc.stateTimer <= 0) {
        npc.rotY = Math.random()*Math.PI*2;
        npc.stateTimer = 2+Math.random()*3;
      }
      npc.x += Math.sin(npc.rotY)*npc.speed;
      npc.z += Math.cos(npc.rotY)*npc.speed;
    } else if (npc.state === 'flee') {
      const dx = npc.x - player.x;
      const dz = npc.z - player.z;
      const d = Math.sqrt(dx*dx+dz*dz)||1;
      npc.x += (dx/d)*npc.speed*2;
      npc.z += (dz/d)*npc.speed*2;
      npc.alertTimer -= dt;
      if (npc.alertTimer <= 0) npc.state = 'walk';
    }
    npc.x = Math.max(-200, Math.min(200, npc.x));
    npc.z = Math.max(-200, Math.min(200, npc.z));
  }

  // Cars update
  for (const car of cars) {
    car.z += car.vz;
    if (car.z > 200) car.z = -200;
    if (car.z < -200) car.z = 200;
    car.rotY = car.vz > 0 ? 0 : Math.PI;
  }

  // Particles update
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vy -= 0.02;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i,1);
  }
  for (let i = bullets.length-1; i >= 0; i--) {
    bullets[i].life -= dt;
    if (bullets[i].life <= 0) bullets.splice(i,1);
  }

  // Running
  player.running = keys['ShiftLeft'] || keys['ShiftRight'];

  // UI update
  document.getElementById('health-fill').style.width = player.health + '%';
  document.getElementById('armor-fill').style.width = player.armor + '%';
  document.getElementById('money').textContent = '$' + game.money.toLocaleString();
  const stars = '⭐'.repeat(game.wanted) + '☆'.repeat(5-game.wanted);
  document.getElementById('wanted').textContent = game.wanted > 0 ? stars : '';
  const w = player.weapons[player.currentWeapon];
  document.getElementById('ammo').textContent = w.ammo < 0 ? '∞' : w.ammo + '/' + w.maxAmmo;
  document.getElementById('weapon-name').textContent = '🔫 ' + w.name;
  document.getElementById('speed').textContent = Math.round(player.speed*30) + ' km/h';
  // Update controls hint for new weapons
  if (player.currentWeapon >= 3) {
    document.getElementById('weapon-name').style.color = '#FF4444';
  } else {
    document.getElementById('weapon-name').style.color = '#ffcc00';
  }
}

// ===== RENDER =====
function getSkyColor() {
  const t = game.dayTime;
  if (t < 0.25) return `rgb(${Math.floor(t*4*100)},${Math.floor(t*4*150)},${Math.floor(t*4*255)})`;
  if (t < 0.5) return `rgb(100,150,255)`;
  if (t < 0.75) return `rgb(${Math.floor((1-(t-0.5)*4)*100)},${Math.floor((1-(t-0.5)*4)*100)},${Math.floor((1-(t-0.5)*4)*200)})`;
  return `rgb(5,5,20)`;
}

function drawBillboard(x, y, z, w, h, color, label) {
  const p = project3D(x, y + h/2, z);
  if (!p) return;
  const pw = w * p.scale * 60;
  const ph = h * p.scale * 60;
  if (pw < 1 || ph < 1) return;
  ctx.fillStyle = color;
  ctx.fillRect(p.x - pw/2, p.y - ph/2, pw, ph);
  if (label && pw > 20) {
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.max(8, Math.min(16, pw/4))}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(label, p.x, p.y + 4);
  }
}

function drawBox(x, y, z, w, h, d, color, roofColor, windowColor) {
  const corners = [
    [x-w/2, y,   z-d/2], [x+w/2, y,   z-d/2],
    [x+w/2, y,   z+d/2], [x-w/2, y,   z+d/2],
    [x-w/2, y+h, z-d/2], [x+w/2, y+h, z-d/2],
    [x+w/2, y+h, z+d/2], [x-w/2, y+h, z+d/2]
  ];
  const proj = corners.map(c => project3D(c[0],c[1],c[2]));
  if (proj.every(p => !p)) return;
  const faces = [
    { verts:[4,5,1,0], color: color, normal: [0,0,-1] },
    { verts:[5,6,2,1], color: color, normal: [1,0,0] },
    { verts:[7,6,5,4], color: roofColor||'#555', normal: [0,1,0] },
    { verts:[0,3,7,4], color: color, normal: [-1,0,0] },
    { verts:[6,7,3,2], color: color, normal: [0,0,1] }
  ];
  const lightDir = normV({x:0.5,y:1,z:0.3});
  for (const face of faces) {
    const pts = face.verts.map(i => proj[i]).filter(p => p);
    if (pts.length < 3) continue;
    const light = Math.max(0.3, dotV({x:face.normal[0],y:face.normal[1],z:face.normal[2]}, lightDir));
    const c = face.color;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = shadeColor(c, light);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Windows
    if (windowColor && face.normal[1] === 0 && pts.length === 4) {
      const rows = Math.floor(h/3);
      const cols = Math.floor(w/3);
      for (let r=0;r<rows;r++) {
        for (let cc=0;cc<cols;cc++) {
          const wx = pts[0].x + (pts[1].x-pts[0].x)*(cc+0.2)/cols;
          const wy = pts[0].y + (pts[3].y-pts[0].y)*(r+0.2)/rows;
          const ww = Math.abs(pts[1].x-pts[0].x)/cols*0.6;
          const wh = Math.abs(pts[3].y-pts[0].y)/rows*0.6;
          if (ww > 2 && wh > 2) {
            ctx.fillStyle = Math.random() > 0.3 ? '#FFEE88' : '#88CCFF';
            ctx.fillRect(wx, wy, ww, wh);
          }
        }
      }
    }
  }
}

function shadeColor(hex, factor) {
  let r,g,b;
  if (hex.startsWith('#')) {
    const n = parseInt(hex.slice(1),16);
    r=(n>>16)&255; g=(n>>8)&255; b=n&255;
  } else if (hex.startsWith('rgb')) {
    const m = hex.match(/\d+/g);
    r=+m[0]; g=+m[1]; b=+m[2];
  } else if (hex.startsWith('hsl')) {
    return hex;
  } else { return hex; }
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

function drawPerson(npc) {
  const d = dist3D(player, {x:npc.x,y:npc.y,z:npc.z});
  if (d > 80) return;
  const bodyP = project3D(npc.x, npc.y+1, npc.z);
  if (!bodyP || bodyP.z < 0.5) return;
  const s = bodyP.scale;
  const bw = 40*s, bh = 60*s;
  if (bw < 2) return;
  // Body
  ctx.fillStyle = npc.health <= 0 ? '#555' : npc.color;
  ctx.fillRect(bodyP.x-bw/2, bodyP.y-bh/2, bw, bh);
  // Head
  const headP = project3D(npc.x, npc.y+1.9, npc.z);
  if (headP) {
    ctx.fillStyle = '#FFCC99';
    ctx.beginPath();
    ctx.arc(headP.x, headP.y, 20*s, 0, Math.PI*2);
    ctx.fill();
  }
  // Health bar
  if (npc.health > 0 && npc.health < 100 && d < 20) {
    const hp = project3D(npc.x, npc.y+2.3, npc.z);
    if (hp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(hp.x-25, hp.y-5, 50, 8);
      ctx.fillStyle = '#00FF00';
      ctx.fillRect(hp.x-25, hp.y-5, 50*(npc.health/100), 8);
    }
  }
  // Alert icon
  if (npc.alertTimer > 0 && npc.health > 0) {
    const ap = project3D(npc.x, npc.y+2.6, npc.z);
    if (ap) {
      ctx.fillStyle = '#FF0000';
      ctx.font = `${Math.max(10,20*s)}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('!', ap.x, ap.y);
    }
  }
}

function drawCar(car) {
  const d = dist3D(player, car);
  if (d > 100) return;
  drawBox(car.x, car.y, car.z, car.w, car.h, car.l, car.color, '#333', null);
  // Wheels
  const wheelPositions = [
    [car.x-car.w/2, car.y, car.z-car.l/3],
    [car.x+car.w/2, car.y, car.z-car.l/3],
    [car.x-car.w/2, car.y, car.z+car.l/3],
    [car.x+car.w/2, car.y, car.z+car.l/3]
  ];
  for (const wp of wheelPositions) {
    const p = project3D(wp[0], wp[1]+0.3, wp[2]);
    if (p && p.scale > 0.5) {
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8*p.scale, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawTree(tree) {
  const d = dist2D(player.x, player.z, tree.x, tree.z);
  if (d > 100) return;
  // Trunk
  const tp = project3D(tree.x, tree.h/2, tree.z);
  if (!tp) return;
  const ts = tp.scale;
  ctx.fillStyle = '#5C3A1E';
  ctx.fillRect(tp.x-5*ts, tp.y-tree.h*30*ts/2, 10*ts, tree.h*30*ts);
  // Leaves
  const lp = project3D(tree.x, tree.h, tree.z);
  if (lp) {
    ctx.fillStyle = '#2D7A2D';
    ctx.beginPath();
    ctx.arc(lp.x, lp.y, tree.r*40*lp.scale, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#3D9A3D';
    ctx.beginPath();
    ctx.arc(lp.x-5*lp.scale, lp.y-10*lp.scale, tree.r*25*lp.scale, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPickup(p) {
  if (!p.active) return;
  const d = dist3D(player, p);
  if (d > 50) return;
  const colors = { health:'#FF3333', armor:'#3399FF', ammo:'#FFAA00', money:'#00FF88' };
  const icons = { health:'❤️', armor:'🛡️', ammo:'🔫', money:'💰' };
  const pp = project3D(p.x, p.y + Math.sin(game.time*3)*0.2, p.z);
  if (!pp) return;
  ctx.fillStyle = colors[p.type];
  ctx.beginPath();
  ctx.arc(pp.x, pp.y, 15*pp.scale, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  if (pp.scale > 1) {
    ctx.font = `${Math.min(20, 20*pp.scale)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(icons[p.type], pp.x, pp.y+6);
  }
}

function drawParticle(p) {
  const pp = project3D(p.x, p.y, p.z);
  if (!pp) return;
  const alpha = p.life / p.maxLife;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(pp.x, pp.y, p.size*pp.scale*30, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawGround() {
  // Sky gradient background
  const horizonY = canvas.height * 0.5 + camera.rotX * canvas.height * 0.8;
  
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
  const skyColor = getSkyColor();
  skyGrad.addColorStop(0, skyColor);
  skyGrad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, horizonY);
  
  // Ground
  const groundGrad = ctx.createLinearGradient(0, horizonY, 0, canvas.height);
  groundGrad.addColorStop(0, '#4A7A4A');
  groundGrad.addColorStop(0.3, '#3A5A3A');
  groundGrad.addColorStop(1, '#2A3A2A');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);
  
  // Road markings
  for (const road of roads) {
    const p1 = road.dir === 'z' ?
      project3D(road.x, 0.01, road.z) :
      project3D(road.x, 0.01, road.z);
    if (!p1) continue;
    const p2 = road.dir === 'z' ?
      project3D(road.x, 0.01, road.z + road.l) :
      project3D(road.x + road.l, 0.01, road.z);
    if (!p2) continue;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = road.w * (p1.scale + (p2?p2.scale:p1.scale)) * 30;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    if (p2) ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }
}

function drawPlayer3D() {
  // Draw player shadow
  const sp = project3D(player.x, 0.01, player.z);
  if (sp) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(sp.x, sp.y, 20*sp.scale, 8*sp.scale, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawMinimap() {
  mctx.clearRect(0,0,150,150);
  mctx.fillStyle = '#1a3a1a';
  mctx.beginPath();
  mctx.arc(75,75,75,0,Math.PI*2);
  mctx.fill();
  const scale = 0.8;
  const cx = 75, cy = 75;
  // Roads
  mctx.strokeStyle = '#555';
  mctx.lineWidth = 3;
  for (const road of roads) {
    const rx = cx + (road.x - player.x)*scale;
    const ry = cy + (road.z - player.z)*scale;
    mctx.beginPath();
    if (road.dir === 'z') { mctx.moveTo(rx,ry-road.l*scale/2); mctx.lineTo(rx,ry+road.l*scale/2); }
    else { mctx.moveTo(rx-road.l*scale/2,ry); mctx.lineTo(rx+road.l*scale/2,ry); }
    mctx.stroke();
  }
  // Buildings
  mctx.fillStyle = '#888';
  for (const b of buildings) {
    const bx = cx + (b.x - player.x)*scale;
    const bz = cy + (b.z - player.z)*scale;
    if (Math.abs(bx-cx)>75 || Math.abs(bz-cy)>75) continue;
    mctx.fillRect(bx-b.w*scale/2, bz-b.d*scale/2, b.w*scale, b.d*scale);
  }
  // NPCs
  for (const npc of npcs) {
    if (npc.health <= 0) continue;
    const nx = cx + (npc.x - player.x)*scale;
    const nz = cy + (npc.z - player.z)*scale;
    if (Math.abs(nx-cx)>75 || Math.abs(nz-cy)>75) continue;
    mctx.fillStyle = '#FF4444';
    mctx.beginPath();
    mctx.arc(nx,nz,3,0,Math.PI*2);
    mctx.fill();
  }
  // Pickups
  for (const p of pickups) {
    if (!p.active) continue;
    const px = cx + (p.x - player.x)*scale;
    const pz = cy + (p.z - player.z)*scale;
    if (Math.abs(px-cx)>75 || Math.abs(pz-cy)>75) continue;
    mctx.fillStyle = p.type==='health'?'#FF0000':p.type==='money'?'#00FF00':'#FFFF00';
    mctx.beginPath();
    mctx.arc(px,pz,4,0,Math.PI*2);
    mctx.fill();
  }
  // Cars
  for (const car of cars) {
    const carx = cx + (car.x - player.x)*scale;
    const carz = cy + (car.z - player.z)*scale;
    if (Math.abs(carx-cx)>75 || Math.abs(carz-cy)>75) continue;
    mctx.fillStyle = car.color;
    mctx.fillRect(carx-3,carz-5,6,10);
  }
  // Player
  mctx.fillStyle = '#00FFFF';
  mctx.beginPath();
  mctx.arc(cx,cy,6,0,Math.PI*2);
  mctx.fill();
  // Direction arrow
  mctx.strokeStyle = '#00FFFF';
  mctx.lineWidth = 2;
  mctx.beginPath();
  mctx.moveTo(cx,cy);
  mctx.lineTo(cx+Math.sin(player.rotY)*12, cy+Math.cos(player.rotY)*12);
  mctx.stroke();
  // Clip circle
  mctx.globalCompositeOperation = 'destination-in';
  mctx.beginPath();
  mctx.arc(75,75,75,0,Math.PI*2);
  mctx.fill();
  mctx.globalCompositeOperation = 'source-over';
}

function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  const horizonY = canvas.height * 0.5 + camera.rotX * canvas.height * 0.8;
  
  // Sky
  const skyColor = getSkyColor();
  const grad = ctx.createLinearGradient(0, 0, 0, Math.max(horizonY, 1));
  grad.addColorStop(0, skyColor);
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, Math.max(horizonY, 0));
  
  // Stars (night)
  drawStars();
  drawMoon();
  drawClouds();
  drawBirds();
  
  // Ground
  const groundGrad = ctx.createLinearGradient(0, horizonY, 0, canvas.height);
  groundGrad.addColorStop(0, '#4A7A4A');
  groundGrad.addColorStop(0.5, '#3A5A3A');
  groundGrad.addColorStop(1, '#2A3A2A');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, Math.max(horizonY, 0), canvas.width, canvas.height - Math.max(horizonY, 0));
  
  // Sun
  const sunX = canvas.width * (0.5 + Math.cos(game.dayTime*Math.PI*2)*0.4);
  const sunY = horizonY * (0.3 + (1 - Math.sin(game.dayTime*Math.PI*2))*0.35);
  ctx.fillStyle = game.dayTime < 0.5 ? '#FFEEAA' : '#CCDDFF';
  ctx.beginPath();
  ctx.arc(sunX, sunY, 30, 0, Math.PI*2);
  ctx.fill();
  
  // Glow
  const sunGlow = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 80);
  sunGlow.addColorStop(0, 'rgba(255,240,100,0.3)');
  sunGlow.addColorStop(1, 'rgba(255,240,100,0)');
  ctx.fillStyle = sunGlow;
  ctx.beginPath();
  ctx.arc(sunX, sunY, 80, 0, Math.PI*2);
  ctx.fill();
  
  // Roads
  for (const road of roads) {
    const p1 = road.dir === 'z' ?
      project3D(road.x, 0.01, road.z) :
      project3D(road.x, 0.01, road.z);
    if (!p1) continue;
    const p2 = road.dir === 'z' ?
      project3D(road.x, 0.01, road.z + road.l) :
      project3D(road.x + road.l, 0.01, road.z);
    if (!p2) continue;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = road.w * (p1.scale + p2.scale) * 30;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    // Road center line
    ctx.strokeStyle = 'rgba(255,255,0,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([20,20]);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  drawPuddles();
  drawBloodDecals();
  drawFootsteps();
  drawSkidMarks();
  drawFences();
  drawPowerLines();
  drawGraffiti();
  drawTrash();
  drawStreetLights();
  
  // Sort objects by distance
  const allObjects = [
    ...buildings.map(b => ({type:'building',obj:b,dist:dist3D(player,b)})),
    ...trees.map(t => ({type:'tree',obj:t,dist:dist2D(player.x,player.z,t.x,t.z)})),
    ...cars.map(c => ({type:'car',obj:c,dist:dist3D(player,c)})),
    ...npcs.map(n => ({type:'npc',obj:n,dist:dist3D(player,{x:n.x,y:n.y,z:n.z})})),
    ...police.map(p => ({type:'police',obj:p,dist:dist3D(player,{x:p.x,y:p.y,z:p.z})})),
    ...pickups.filter(p=>p.active).map(p => ({type:'pickup',obj:p,dist:dist3D(player,p)})),
    ...particles.map(p => ({type:'particle',obj:p,dist:dist3D(player,p)})),
    ...bullets.map(b => ({type:'bullet',obj:b,dist:dist3D(player,b)}))
  ].sort((a,b) => b.dist - a.dist);
  for (const item of allObjects) {
    if (item.dist > 200) continue;
    if (item.type === 'building') drawBox(item.obj.x,item.obj.y,item.obj.z,item.obj.w,item.obj.h,item.obj.d,item.obj.color,item.obj.roofColor,item.obj.windowColor);
    else if (item.type === 'tree') drawTree(item.obj);
    else if (item.type === 'car') drawCar(item.obj);
    else if (item.type === 'npc') drawPerson(item.obj);
    else if (item.type === 'police') drawPolice(item.obj);
    else if (item.type === 'pickup') drawPickup(item.obj);
    else if (item.type === 'particle') drawParticle(item.obj);
    else if (item.type === 'bullet') {
      const bp = project3D(item.obj.x,item.obj.y,item.obj.z);
      if (bp) {
        ctx.fillStyle = item.obj.color;
        ctx.globalAlpha = item.obj.life/item.obj.maxLife;
        ctx.beginPath();
        ctx.arc(bp.x,bp.y,item.obj.size*bp.scale*30,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
  drawSmoke();
  drawFire();
  drawExplosions();
  drawHelicopter();
  drawDamageNumbers();
  drawPlayer3D();
  drawWeather();
  drawHUDExtras();
  drawWantedMeter();
  drawMinimap();
}

// ===== INPUT HANDLERS =====
document.addEventListener('keydown', e => { keys[e.code] = true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', () => {
  if (!mouse.locked) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  mouse.locked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
  if (mouse.locked) { mouse.dx += e.movementX; mouse.dy += e.movementY; }
});

document.addEventListener('mousedown', e => { mouse.buttons[e.button] = true; });
document.addEventListener('mouseup', e => { mouse.buttons[e.button] = false; });

// Mobile joystick
const joystickZone = document.getElementById('joystick-zone');
const joystickKnob = document.getElementById('joystick-knob');
joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = joystickZone.getBoundingClientRect();
  joystick.active = true;
  joystick.id = t.identifier;
  joystick.startX = rect.left + 70;
  joystick.startY = rect.top + 70;
  joystick.dx = 0; joystick.dy = 0;
}, {passive:false});

document.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      const dx = t.clientX - joystick.startX;
      const dy = t.clientY - joystick.startY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const maxDist = 50;
      joystick.dx = dist > maxDist ? (dx/dist)*maxDist : dx;
      joystick.dy = dist > maxDist ? (dy/dist)*maxDist : dy;
      joystickKnob.style.transform = `translate(calc(-50% + ${joystick.dx}px), calc(-50% + ${joystick.dy}px))`;
    }
    if (t.identifier === camTouch.id) {
      const dx = t.clientX - camTouch.startX;
      const dy = t.clientY - camTouch.startY;
      player.rotY += dx * 0.005;
      player.rotX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, player.rotX - dy * 0.005));
      camera.rotY = player.rotY;
      camera.rotX = player.rotX;
      camTouch.startX = t.clientX;
      camTouch.startY = t.clientY;
    }
  }
}, {passive:false});

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystick.id) {
      joystick.active = false;
      joystick.dx = 0; joystick.dy = 0;
      joystickKnob.style.transform = 'translate(-50%,-50%)';
    }
    if (t.identifier === camTouch.id) camTouch.active = false;
  }
});

const camZone = document.getElementById('camera-zone');
camZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  camTouch.active = true;
  camTouch.id = t.identifier;
  camTouch.startX = t.clientX;
  camTouch.startY = t.clientY;
}, {passive:false});

// Mobile buttons
const btnJump = document.getElementById('btn-jump');
const btnShoot = document.getElementById('btn-shoot');
const btnRun = document.getElementById('btn-run');
const btnWeapon = document.getElementById('btn-weapon');

btnJump.addEventListener('touchstart', e => { e.preventDefault(); mobileButtons.jump = true; }, {passive:false});
btnJump.addEventListener('touchend', e => { e.preventDefault(); mobileButtons.jump = false; }, {passive:false});
btnShoot.addEventListener('touchstart', e => { e.preventDefault(); mobileButtons.shoot = true; }, {passive:false});
btnShoot.addEventListener('touchend', e => { e.preventDefault(); mobileButtons.shoot = false; }, {passive:false});
btnRun.addEventListener('touchstart', e => { e.preventDefault(); mobileButtons.run = true; }, {passive:false});
btnRun.addEventListener('touchend', e => { e.preventDefault(); mobileButtons.run = false; }, {passive:false});
btnWeapon.addEventListener('touchstart', e => {
  e.preventDefault();
  player.currentWeapon = (player.currentWeapon + 1) % player.weapons.length;
  showNotification('Weapon: ' + player.weapons[player.currentWeapon].name);
}, {passive:false});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

document.addEventListener('keydown', e => {
  if (e.code === 'KeyP') {
    game.paused = !game.paused;
    showNotification(game.paused ? '⏸ PAUSED' : '▶ RESUMED');
  }
});

// ===== GAME LOOP =====
function gameLoop(timestamp) {
  if (!game.paused) update(timestamp);
  render();
  requestAnimationFrame(gameLoop);
}

// ===== INIT =====
generateWorld();
initStreetLights();
initPuddles();
initClouds();
initBirds();
initStars();
initGraffiti();
initTrash();
startMission(0);
showNotification('🎮 GTA5 - Click to lock mouse | WASD=Move | G=Grenade | T=Stats | P=Pause');
requestAnimationFrame(gameLoop);
</script>
