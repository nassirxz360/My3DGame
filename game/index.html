<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة ناصر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #e94560;
        }

        #score-board {
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            width: 360px;
            height: 400px;
            background: #16213e;
            border: 2px solid #e94560;
            border-radius: 12px;
            overflow: hidden;
        }

        #player {
            position: absolute;
            bottom: 10px;
            left: 160px;
            width: 40px;
            height: 40px;
            background: #0f3460;
            border: 2px solid #e94560;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .enemy {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .bullet {
            position: absolute;
            width: 6px;
            height: 16px;
            background: #f5a623;
            border-radius: 4px;
        }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 16px;
            gap: 10px;
        }

        .btn-row {
            display: flex;
            gap: 16px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s, opacity 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .ctrl-btn:active {
            transform: scale(0.9);
            opacity: 0.8;
        }

        #btn-left {
            background: #0f3460;
            color: #fff;
        }

        #btn-right {
            background: #0f3460;
            color: #fff;
        }

        #btn-shoot {
            background: #e94560;
            color: #fff;
            width: 80px;
            height: 80px;
            font-size: 30px;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: #e94560;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            gap: 16px;
            border-radius: 12px;
        }

        #game-over button {
            padding: 12px 30px;
            font-size: 18px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🎮 لعبة ناصر</h1>
<div id="score-board">النقاط: <span id="score">0</span> | الحياة: <span id="lives">3</span> ❤️</div>

<div id="game-container">
    <div id="player">🚀</div>
    <div id="game-over">
        <div>💀 انتهت اللعبة!</div>
        <div>نقاطك: <span id="final-score">0</span></div>
        <button onclick="restartGame()">🔄 العب مجدداً</button>
    </div>
</div>

<div id="controls">
    <div class="btn-row">
        <button class="ctrl-btn" id="btn-left">⬅️</button>
        <button class="ctrl-btn" id="btn-shoot">🔥</button>
        <button class="ctrl-btn" id="btn-right">➡️</button>
    </div>
</div>

<script>
    const gameContainer = document.getElementById('game-container');
    const playerEl = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');

    let playerX = 160;
    let score = 0;
    let lives = 3;
    let bullets = [];
    let enemies = [];
    let gameRunning = true;
    let enemyInterval, gameLoop;

    const GAME_WIDTH = 360;
    const PLAYER_SPEED = 18;
    const BULLET_SPEED = 10;
    const ENEMY_SPEED = 2;

    // Controls
    let movingLeft = false;
    let movingRight = false;

    document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); movingLeft = true; });
    document.getElementById('btn-left').addEventListener('touchend', e => { e.preventDefault(); movingLeft = false; });
    document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); movingRight = true; });
    document.getElementById('btn-right').addEventListener('touchend', e => { e.preventDefault(); movingRight = false; });
    document.getElementById('btn-shoot').addEventListener('touchstart', e => { e.preventDefault(); shoot(); });

    // Also support mouse for desktop
    document.getElementById('btn-left').addEventListener('mousedown', () => movingLeft = true);
    document.getElementById('btn-left').addEventListener('mouseup', () => movingLeft = false);
    document.getElementById('btn-right').addEventListener('mousedown', () => movingRight = true);
    document.getElementById('btn-right').addEventListener('mouseup', () => movingRight = false);
    document.getElementById('btn-shoot').addEventListener('mousedown', () => shoot());

    function shoot() {
        if (!gameRunning) return;
        const bullet = document.createElement('div');
        bullet.classList.add('bullet');
        const bx = playerX + 17;
        const by = 340;
        bullet.style.left = bx + 'px';
        bullet.style.top = by + 'px';
        gameContainer.appendChild(bullet);
        bullets.push({ el: bullet, x: bx, y: by });
    }

    function spawnEnemy() {
        if (!gameRunning) return;
        const enemy = document.createElement('div');
        enemy.classList.add('enemy');
        const ex = Math.floor(Math.random() * (GAME_WIDTH - 40));
        enemy.style.left = ex + 'px';
        enemy.style.top = '0px';
        enemy.innerText = ['👾','👹','🤖','💀'][Math.floor(Math.random()*4)];
        gameContainer.appendChild(enemy);
        enemies.push({ el: enemy, x: ex, y: 0 });
    }

    function update() {
        if (!gameRunning) return;

        // Move player
        if (movingLeft) playerX = Math.max(0, playerX - PLAYER_SPEED);
        if (movingRight) playerX = Math.min(GAME_WIDTH - 40, playerX + PLAYER_SPEED);
        playerEl.style.left = playerX + 'px';

        // Move bullets
        bullets = bullets.filter(b => {
            b.y -= BULLET_SPEED;
            b.el.style.top = b.y + 'px';
            if (b.y < -20) {
                b.el.remove();
                return false;
            }
            return true;
        });

        // Move enemies
        enemies = enemies.filter(e => {
            e.y += ENEMY_SPEED;
            e.el.style.top = e.y + 'px';

            // Enemy reaches bottom
            if (e.y > 390) {
                e.el.remove();
                lives--;
                livesEl.textContent = lives;
                if (lives <= 0) endGame();
                return false;
            }

            // Check collision with bullets
            for (let i = 0; i < bullets.length; i++) {
                const b = bullets[i];
                if (
                    b.x < e.x + 36 && b.x + 6 > e.x &&
                    b.y < e.y + 36 && b.y + 16 > e.y
                ) {
                    e.el.remove();
                    b.el.remove();
                    bullets.splice(i, 1);
                    score += 10;
                    scoreEl.textContent = score;
                    return false;
                }
            }

            // Check collision with player
            if (
                e.x < playerX + 40 && e.x + 36 > playerX &&
                e.y < 390 && e.y + 36 > 350
            ) {
                e.el.remove();
                lives--;
                livesEl.textContent = lives;
                if (lives <= 0) endGame();
                return false;
            }

            return true;
        });
    }

    function endGame() {
        gameRunning = false;
        clearInterval(enemyInterval);
        cancelAnimationFrame(gameLoop);
        finalScoreEl.textContent = score;
        gameOverEl.style.display = 'flex';
    }

    function restartGame() {
        // Clear enemies and bullets
        enemies.forEach(e => e.el.remove());
        bullets.forEach(b => b.el.remove());
        enemies = [];
        bullets = [];
        score = 0;
        lives = 3;
        playerX = 160;
        scoreEl.textContent = score;
        livesEl.textContent = lives;
        gameOverEl.style.display = 'none';
        gameRunning = true;
        startGame();
    }

    function loop() {
        update();
        gameLoop = requestAnimationFrame(loop);
    }

    function startGame() {
        enemyInterval = setInterval(spawnEnemy, 1200);
        loop();
    }

    startGame();
</script>

</body>
</html>
