<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>لعبة القفز</title>
<style>
body{margin:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;}
canvas{border:2px solid #00ffff;border-radius:10px;}
</style>
</head>
<body>
<canvas id="c" width="400" height="400"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let p={x:60,y:300,vy:0,onGround:false};
let obs=[{x:400,w:30,h:50}];
let score=0,speed=3,alive=true;

document.addEventListener('keydown',e=>{if(e.code==='Space'&&p.onGround){p.vy=-12;p.onGround=false;}});
c.addEventListener('click',()=>{if(p.onGround){p.vy=-12;p.onGround=false;}});

function reset(){p={x:60,y:300,vy:0,onGround:false};obs=[{x:400,w:30,h:50}];score=0;speed=3;alive=true;}

function loop(){
  x.fillStyle='#1a1a2e';x.fillRect(0,0,400,400);
  x.fillStyle='#00ffff';x.fillRect(0,360,400,40);

  if(alive){
    p.vy+=0.6;p.y+=p.vy;
    if(p.y>=300){p.y=300;p.vy=0;p.onGround=true;}
    score++;speed=3+score/500;
    obs.forEach(o=>o.x-=speed);
    if(obs[0].x<-50)obs=[{x:400,w:30,h:Math.random()*40+30}];
    let o=obs[0];
    if(p.x+25>o.x&&p.x<o.x+o.w&&p.y+30>360-o.h)alive=false;
  }

  x.fillStyle='#ff4444';
  obs.forEach(o=>x.fillRect(o.x,360-o.h,o.w,o.h));

  x.fillStyle='#ffdd00';
  x.beginPath();x.arc(p.x+15,p.y+15,15,0,Math.PI*2);x.fill();
  x.fillStyle='#000';x.fillRect(p.x+10,p.y+10,4,4);x.fillRect(p.x+18,p.y+10,4,4);

  x.fillStyle='#fff';x.font='20px Arial';x.fillText('النقاط: '+Math.floor(score/10),10,30);

  if(!alive){
    x.fillStyle='rgba(0,0,0,0.6)';x.fillRect(0,0,400,400);
    x.fillStyle='#ff4444';x.font='bold 36px Arial';x.textAlign='center';x.fillText('انتهت اللعبة!',200,180);
    x.fillStyle='#fff';x.font='20px Arial';x.fillText('اضغط للعب مجدداً',200,230);
    c.onclick=()=>{reset();c.onclick=()=>{if(p.onGround){p.vy=-12;p.onGround=false;}};};
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
