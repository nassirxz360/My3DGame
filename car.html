<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة سباق السيارات 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 15px; pointer-events: none; z-index: 10;
  }
  .stat-box {
    background: rgba(0,0,0,0.7);
    border: 2px solid #00ffff;
    border-radius: 10px;
    padding: 10px 18px;
    color: #fff;
    text-align: center;
    min-width: 100px;
  }
  .stat-box .label { font-size: 11px; color: #00ffff; text-transform: uppercase; letter-spacing: 1px; }
  .stat-box .value { font-size: 26px; font-weight: bold; color: #fff; }
  #speedometer {
    position: fixed; bottom: 160px; right: 20px;
    width: 130px; height: 130px;
    z-index: 10; pointer-events: none;
  }
  #lap-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 48px; font-weight: bold; color: #ffff00;
    text-shadow: 0 0 20px #ff8800, 0 0 40px #ff4400;
    display: none; z-index: 20;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.1); } }
  #minimap {
    position: fixed; bottom: 160px; left: 20px;
    width: 120px; height: 120px;
    border: 2px solid #00ffff;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    z-index: 10; pointer-events: none;
    overflow: hidden;
  }
  #minimap canvas { width: 120px; height: 120px; }
  /* Mobile Controls */
  #mobile-controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 150px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px;
    z-index: 15;
    pointer-events: none;
  }
  .ctrl-group { display: flex; gap: 10px; pointer-events: all; }
  .ctrl-btn {
    width: 65px; height: 65px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    color: #fff;
    font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
    box-shadow: 0 0 15px rgba(0,200,255,0.3);
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(0,200,255,0.4);
    border-color: #00ffff;
    box-shadow: 0 0 25px rgba(0,200,255,0.7);
  }
  .ctrl-btn.gas { background: rgba(0,255,100,0.2); border-color: rgba(0,255,100,0.6); }
  .ctrl-btn.gas.pressed { background: rgba(0,255,100,0.5); box-shadow: 0 0 25px rgba(0,255,100,0.8); }
  .ctrl-btn.brake { background: rgba(255,50,50,0.2); border-color: rgba(255,50,50,0.6); }
  .ctrl-btn.brake.pressed { background: rgba(255,50,50,0.5); box-shadow: 0 0 25px rgba(255,50,50,0.8); }
  .steer-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .steer-row { display: flex; gap: 8px; }
  #start-screen {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; color: #fff;
  }
  #start-screen h1 {
    font-size: 52px; font-weight: 900;
    background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none; margin-bottom: 10px;
    animation: titleGlow 2s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { filter: drop-shadow(0 0 10px #00ffff); }
    to { filter: drop-shadow(0 0 30px #ff00ff); }
  }
  #start-screen p { color: #aaa; margin-bottom: 40px; font-size: 16px; }
  .start-btn {
    padding: 18px 60px; font-size: 22px; font-weight: bold;
    background: linear-gradient(135deg, #00ffff, #0088ff);
    color: #000; border: none; border-radius: 50px;
    cursor: pointer; letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(0,200,255,0.6);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0,200,255,0.9); }
  .car-preview { font-size: 80px; margin-bottom: 20px; animation: bounce 1s ease-in-out infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
  #countdown {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 120px; font-weight: 900; color: #ffff00;
    text-shadow: 0 0 40px #ff8800;
    display: none; z-index: 50;
    animation: countPulse 0.8s ease-out;
  }
  @keyframes countPulse { from { transform: translate(-50%,-50%) scale(2); opacity: 0; } to { transform: translate(-50%,-50%) scale(1); opacity: 1; } }
  #finish-screen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; color: #fff;
  }
  #finish-screen h2 { font-size: 60px; color: #ffff00; text-shadow: 0 0 30px #ff8800; margin-bottom: 20px; }
  #finish-screen .time-display { font-size: 36px; color: #00ffff; margin-bottom: 30px; }
  .nitro-bar-container {
    position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
    width: 200px; z-index: 10; pointer-events: none;
  }
  .nitro-label { color: #ff8800; font-size: 12px; text-align: center; letter-spacing: 2px; margin-bottom: 4px; }
  .nitro-bar-bg { background: rgba(0,0,0,0.6); border: 2px solid #ff8800; border-radius: 10px; height: 16px; overflow: hidden; }
  .nitro-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4400, #ffaa00, #ffff00); border-radius: 8px; transition: width 0.1s; }
  #nitro-btn {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,140,0,0.25); border: 3px solid #ff8800;
    color: #ffaa00; font-size: 14px; font-weight: bold;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; z-index: 15; touch-action: none;
    box-shadow: 0 0 20px rgba(255,140,0,0.4);
    user-select: none; -webkit-user-select: none;
  }
  #nitro-btn.pressed { background: rgba(255,140,0,0.6); box-shadow: 0 0 40px rgba(255,200,0,0.9); }
  #nitro-btn span { font-size: 24px; }
</style>
</head>
<body>

<div id="start-screen">
  <div class="car-preview">🏎️</div>
  <h1>سباق السيارات 3D</h1>
  <p>اختبر مهاراتك في قيادة السيارات الخارقة!</p>
  <button class="start-btn" onclick="startGame()">🚀 ابدأ السباق</button>
</div>

<div id="countdown"></div>
<div id="lap-msg"></div>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div class="stat-box">
    <div class="label">اللفة</div>
    <div class="value" id="lap-display">1 / 3</div>
  </div>
  <div class="stat-box">
    <div class="label">الوقت</div>
    <div class="value" id="time-display">0:00.0</div>
  </div>
  <div class="stat-box">
    <div class="label">أفضل وقت</div>
    <div class="value" id="best-display">--:--</div>
  </div>
</div>

<canvas id="minimapCanvas" style="position:fixed;bottom:160px;left:20px;width:120px;height:120px;border:2px solid #00ffff;border-radius:10px;background:rgba(0,0,0,0.7);z-index:10;"></canvas>

<canvas id="speedCanvas" style="position:fixed;bottom:160px;right:20px;width:130px;height:130px;z-index:10;"></canvas>

<div class="nitro-bar-container">
  <div class="nitro-label">⚡ نيترو</div>
  <div class="nitro-bar-bg"><div class="nitro-bar-fill" id="nitro-fill" style="width:100%"></div></div>
</div>

<div id="mobile-controls">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-left" ontouchstart="pressKey('left',true)" ontouchend="pressKey('left',false)">◀</button>
    <button class="ctrl-btn" id="btn-right" ontouchstart="pressKey('right',true)" ontouchend="pressKey('right',false)">▶</button>
  </div>
  <div class="ctrl-group" style="flex-direction:column;gap:10px;">
    <button class="ctrl-btn gas" id="btn-gas" ontouchstart="pressKey('gas',true)" ontouchend="pressKey('gas',false)">▲</button>
    <button class="ctrl-btn brake" id="btn-brake" ontouchstart="pressKey('brake',true)" ontouchend="pressKey('brake',false)">▼</button>
  </div>
</div>

<button id="nitro-btn" ontouchstart="pressKey('nitro',true)" ontouchend="pressKey('nitro',false)" onmousedown="pressKey('nitro',true)" onmouseup="pressKey('nitro',false)">
  <span>⚡</span>نيترو
</button>

<div id="finish-screen">
  <h2>🏆 انتهى السباق!</h2>
  <div class="time-display" id="finish-time"></div>
  <button class="start-btn" onclick="restartGame()">🔄 العب مجدداً</button>
</div>

<script>

const spCanvas = document.getElementById('speedCanvas');

];
