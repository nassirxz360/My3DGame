<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة القتال 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; }
#gameCanvas { display: block; width: 100vw; height: 100vh; }
#ui { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; }
#healthBars { display: flex; justify-content: space-between; padding: 15px; }
.healthContainer { width: 40%; }
.playerName { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 4px #000; margin-bottom: 5px; }
.healthBar { height: 20px; background: #333; border-radius: 10px; border: 2px solid #fff; overflow: hidden; }
.healthFill { height: 100%; border-radius: 8px; transition: width 0.2s; }
#p1Health .healthFill { background: linear-gradient(90deg, #ff4444, #ff8800); }
#p2Health .healthFill { background: linear-gradient(90deg, #4488ff, #00ccff); }
#p2Health { direction: ltr; }
#roundInfo { text-align: center; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; padding: 5px; }
#timer { text-align: center; color: #ffff00; font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #ff8800; }
#message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffff00; font-size: 48px; font-weight: bold; text-shadow: 0 0 20px #ff8800, 2px 2px 4px #000; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.3s; text-align: center; }
#controls { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 15; pointer-events: none; }
#leftControls { position: absolute; bottom: 20px; left: 20px; pointer-events: all; }
#rightControls { position: absolute; bottom: 20px; right: 20px; pointer-events: all; }
.dpad { position: relative; width: 130px; height: 130px; }
.dpadBtn { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; cursor: pointer; user-select: none; -webkit-user-select: none; transition: background 0.1s; }
.dpadBtn:active, .dpadBtn.pressed { background: rgba(255,255,255,0.5); }
#btnUp { top: 0; left: 45px; }
#btnDown { bottom: 0; left: 45px; }
#btnLeft { top: 45px; left: 0; }
#btnRight { top: 45px; right: 0; }
.actionBtns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.actionBtn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: bold; cursor: pointer; user-select: none; -webkit-user-select: none; transition: all 0.1s; text-align: center; line-height: 1.2; }
.actionBtn:active, .actionBtn.pressed { transform: scale(0.9); filter: brightness(1.5); }
#btnPunch { background: rgba(255, 100, 0, 0.6); }
#btnKick { background: rgba(255, 0, 100, 0.6); }
#btnBlock { background: rgba(0, 150, 255, 0.6); }
#btnSpecial { background: rgba(150, 0, 255, 0.6); }
#startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#startScreen h1 { color: #ff8800; font-size: 42px; text-shadow: 0 0 20px #ff4400; margin-bottom: 10px; }
#startScreen p { color: #aaa; font-size: 16px; margin-bottom: 30px; }
#startBtn { padding: 15px 50px; background: linear-gradient(135deg, #ff4400, #ff8800); color: #fff; border: none; border-radius: 30px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #ff4400; }
#startBtn:hover { transform: scale(1.05); }
#gameOver { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 30; display: none; flex-direction: column; align-items: center; justify-content: center; }
#gameOver h2 { color: #ffff00; font-size: 36px; text-shadow: 0 0 15px #ff8800; margin-bottom: 20px; }
#gameOver p { color: #fff; font-size: 20px; margin-bottom: 30px; }
#restartBtn { padding: 12px 40px; background: linear-gradient(135deg, #0044ff, #0088ff); color: #fff; border: none; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="healthBars">
    <div class="healthContainer">
      <div class="playerName">⚔️ المحارب</div>
      <div class="healthBar" id="p1Health"><div class="healthFill" id="p1Fill" style="width:100%"></div></div>
    </div>
    <div style="text-align:center">
      <div id="timer">60</div>
      <div id="roundInfo">الجولة 1</div>
    </div>
    <div class="healthContainer" style="text-align:right">
      <div class="playerName">🤖 الخصم</div>
      <div class="healthBar" id="p2Health"><div class="healthFill" id="p2Fill" style="width:100%"></div></div>
    </div>
  </div>
</div>

<div id="message"></div>

<div id="controls">
  <div id="leftControls">
    <div class="dpad">
      <div class="dpadBtn" id="btnUp" ontouchstart="pressBtn('up',true)" ontouchend="pressBtn('up',false)" onmousedown="pressBtn('up',true)" onmouseup="pressBtn('up',false)">▲</div>
      <div class="dpadBtn" id="btnDown" ontouchstart="pressBtn('down',true)" ontouchend="pressBtn('down',false)" onmousedown="pressBtn('down',true)" onmouseup="pressBtn('down',false)">▼</div>
      <div class="dpadBtn" id="btnLeft" ontouchstart="pressBtn('left',true)" ontouchend="pressBtn('left',false)" onmousedown="pressBtn('left',true)" onmouseup="pressBtn('left',false)">◀</div>
      <div class="dpadBtn" id="btnRight" ontouchstart="pressBtn('right',true)" ontouchend="pressBtn('right',false)" onmousedown="pressBtn('right',true)" onmouseup="pressBtn('right',false)">▶</div>
    </div>
  </div>
  <div id="rightControls">
    <div class="actionBtns">
      <div class="actionBtn" id="btnPunch" ontouchstart="pressBtn('punch',true)" ontouchend="pressBtn('punch',false)" onmousedown="pressBtn('punch',true)" onmouseup="pressBtn('punch',false)">👊<br>لكمة</div>
      <div class="actionBtn" id="btnKick" ontouchstart="pressBtn('kick',true)" ontouchend="pressBtn('kick',false)" onmousedown="pressBtn('kick',true)" onmouseup="pressBtn('kick',false)">🦵<br>ركلة</div>
      <div class="actionBtn" id="btnBlock" ontouchstart="pressBtn('block',true)" ontouchend="pressBtn('block',false)" onmousedown="pressBtn('block',true)" onmouseup="pressBtn('block',false)">🛡️<br>دفاع</div>
      <div class="actionBtn" id="btnSpecial" ontouchstart="pressBtn('special',true)" ontouchend="pressBtn('special',false)" onmousedown="pressBtn('special',true)" onmouseup="pressBtn('special',false)">⚡<br>خاص</div>
    </div>
  </div>
</div>

<div id="startScreen">
  <h1>⚔️ القتال 3D ⚔️</h1>
  <p>العب ضد الذكاء الاصطناعي</p>
  <button id="startBtn" onclick="startGame()">ابدأ اللعبة</button>
</div>

<div id="gameOver">
  <h2 id="gameOverTitle">انتهت اللعبة</h2>
  <p id="gameOverMsg">نتيجة اللعبة</p>
  <button id="restartBtn" onclick="restartGame()">العب مجدداً</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const keys = {};
const btnState = {};

function pressBtn(btn, state) {
  btnState[btn] = state;
  const el = document.getElementById('btn' + btn.charAt(0).toUpperCase() + btn.slice(1));
  if (el) el.classList.toggle('pressed', state);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'ArrowLeft') btnState['left'] = true;
  if (e.key === 'ArrowRight') btnState['right'] = true;
  if (e.key === 'ArrowUp') btnState['up'] = true;
  if (e.key === 'ArrowDown') btnState['down'] = true;
  if (e.key === 'z' || e.key === 'Z') btnState['punch'] = true;
  if (e.key === 'x' || e.key === 'X') btnState['kick'] = true;
  if (e.key === 'c' || e.key === 'C') btnState['block'] = true;
  if (e.key === 'v' || e.key === 'V') btnState['special'] = true;
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (e.key === 'ArrowLeft') btnState['left'] = false;
  if (e.key === 'ArrowRight') btnState['right'] = false;
  if (e.key === 'ArrowUp') btnState['up'] = false;
  if (e.key === 'ArrowDown') btnState['down'] = false;
  if (e.key === 'z' || e.key === 'Z') btnState['punch'] = false;
  if (e.key === 'x' || e.key === 'X') btnState['kick'] = false;
  if (e.key === 'c' || e.key === 'C') btnState['block'] = false;
  if (e.key === 'v' || e.key === 'V') btnState['special'] = false;
});

const FLOOR_Y = 0.72;
const GRAVITY = 0.018;
const JUMP_FORCE = -0.38;

function createFighter(x, color, isAI) {
  return {
    x, y: FLOOR_Y, z: 0,
    vx: 0, vy: 0, vz: 0,
    hp: 100, maxHp: 100,
    color,
    facing: isAI ? -1 : 1,
    isAI,
    state: 'idle',
    stateTimer: 0,
    attackTimer: 0,
    blockTimer: 0,
    hitTimer: 0,
    specialCooldown: 0,
    combo: 0,
    comboTimer: 0,
    onGround: true,
    animFrame: 0,
    animTimer: 0,
    particles: []
  };
}

let p1, p2, gameRunning, gameTime, round, p1Wins, p2Wins;
let effects = [];
let camera = { x: 0.5, y: 0, zoom: 1 };

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  restartGame();
}

function restartGame() {
  document.getElementById('gameOver').style.display = 'none';
  p1 = createFighter(0.3, '#ff6600', false);
  p2 = createFighter(0.7, '#0066ff', true);
  p1.facing = 1;
  p2.facing = -1;
  gameRunning = true;
  gameTime = 60;
  round = round || 1;
  p1Wins = p1Wins || 0;
  p2Wins = p2Wins || 0;
  effects = [];
  document.getElementById('roundInfo').textContent = 'الجولة ' + round;
  showMessage('استعد!', 1500);
  setTimeout(() => { if (
